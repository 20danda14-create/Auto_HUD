<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drift & Performance HUD Cockpit - Ultimate Safe Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #020202;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: var(--hud-color, #00ff00);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #canvas { display: block; width: 100%; height: 100%; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.98); z-index: 100;
        }
        #startBtn {
            background: #00ff00 !important;
            color: #000000 !important;
            border: none; padding: 18px 36px;
            font-size: 1.3rem; font-weight: bold;
            cursor: pointer; border-radius: 8px;
            box-shadow: 0 0 30px #00ff00;
            font-family: monospace;
        }
        
        .hud-controls {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 10;
        }
        .control-btn {
            background: rgba(0, 0, 0, 0.7); color: inherit; border: 1.5px solid currentColor;
            padding: 8px 14px; font-size: 0.75rem; font-weight: bold; border-radius: 4px;
            box-shadow: 0 0 8px rgba(0,0,0,0.5); cursor: pointer;
        }
        .streaming-active {
            animation: blink 1.5s infinite;
            background: rgba(0, 150, 255, 0.25) !important;
            border-color: #0096ff !important; color: #0096ff !important;
        }
        .sim-active {
            background: rgba(255, 165, 0, 0.25) !important;
            border-color: #ffa500 !important; color: #ffa500 !important;
        }
        #httpsWarning {
            display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: red; color: white; padding: 6px 15px; font-weight: bold; font-size: 0.8rem;
            border-radius: 4px; z-index: 110; text-align: center; box-shadow: 0 0 15px red;
        }
        @keyframes blink { 50% { opacity: 0.6; } }
    </style>
</head>
<body>

    <div id="httpsWarning">⚠️ KRİTİK HATA: HTTPS ZORUNLUDUR! Sensörler bu bağlantıda çalışmaz.</div>

    <div id="overlay">
        <button id="startBtn">SİSTEMLERİ BAŞLAT</button>
        <p style="color: #a4a4a4; text-align: center; font-size: 0.85rem; max-width: 80%; line-height: 1.5; margin-top: 15px;">
            Pist ve Drift Telemetri Paketi Aktif.<br>
            <span style="color: #00ff00;">iOS Kilitlenme Korumalı Senkron Altyapı Entegre Edildi.</span>
        </p>
    </div>

    <div class="hud-controls">
        <button id="calibrateBtn" class="control-btn">SIFIRLA</button>
        <button id="themeBtn" class="control-btn">TEMA</button>
        <button id="simBtn" class="control-btn">SİMÜLASYON: KAPALI</button>
        <button id="streamBtn" class="control-btn">CANLI YAYIN BAŞLAT</button>
        <button id="lapBtn" class="control-btn">TUR ATLA</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/1IzqoYHpdwrAy7So37lOgWq3yUMR3w7EC6oeO0TbT4_s/exec";

        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            document.getElementById('httpsWarning').style.display = 'block';
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const themeBtn = document.getElementById('themeBtn');
        const simBtn = document.getElementById('simBtn');
        const streamBtn = document.getElementById('streamBtn');
        const lapBtn = document.getElementById('lapBtn');
        const overlay = document.getElementById('overlay');

        const THEMES = [
            { name: "MIL-GREEN", main: "#00ff00" },
            { name: "BOEING-AMBER", main: "#ffb000" },
            { name: "AIRBUS-WHITE", main: "#ffffff" }
        ];
        let currentThemeIdx = 0;

        let telemetry = {
            pitch: 0, rawPitch: 0, roll: 0, rawRoll: 0,
            heading: 0, gpsHeading: null, compassHeading: 0, lastHeading: 0,
            speed: 0, altitude: 0, lastAltitude: 0, latG: 0, lonG: 0, vertG: 1.0,
            gpsAccuracy: 0, gpsStatus: "SEARCHING", verticalSpeed: 0, roadGrade: 0,
            yawRate: 0, radius: 0, sensorType: "INIT", horizonQuality: "OK", warnings: []
        };

        let offset = { pitch: 90, roll: 0, ax: 0, ay: 0, az: 0 };
        let isCalibrated = false; let lastGpsTime = null; let lastLat = null; let lastLon = null;
        let lastUpdateTime = Date.now();

        let timers = {
            p0_100: { state: 0, start: 0, time: 0 },
            p100_200: { state: 0, start: 0, time: 0 },
            d400m: { state: 0, start: 0, time: 0, dist: 0 },
            currentLap: 0, bestLap: 0, lapStart: 0
        };

        let isStreaming = false; let isSimulating = false;
        let streamBuffer = []; let lastSampleTime = 0; let lastSendTime = 0;

        function setHUDColor(idx) { document.body.style.setProperty('--hud-color', THEMES[idx].main); }
        setHUDColor(currentThemeIdx);
        themeBtn.addEventListener('click', () => { currentThemeIdx = (currentThemeIdx + 1) % THEMES.length; setHUDColor(currentThemeIdx); });

        simBtn.addEventListener('click', () => {
            isSimulating = !isSimulating;
            if(isSimulating) {
                simBtn.classList.add('sim-active'); simBtn.innerText = "SİMÜLASYON: AÇIK";
            } else {
                simBtn.classList.remove('sim-active'); simBtn.innerText = "SİMÜLASYON: KAPALI";
                telemetry.speed = 0; telemetry.latG = 0; telemetry.lonG = 0;
            }
        });

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio; canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize); resize();

        // KESİN DÜZELTME: async kelimesi fonksiyondan tamamen kaldırıldı. %100 Senkron akış sağlandı.
        startBtn.addEventListener('click', () => {
            // Adım 1: UI Elemanlarını Anında Aç (Hiçbir koşul ve sensör cevabı beklenmez)
            overlay.style.display = 'none';
            timers.lapStart = Date.now();
            animate();

            // Adım 2: GPS Altyapısını Başlat
            try {
                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition((pos) => {
                        if (isSimulating) return;
                        let currentSpeed = 0; const now = Date.now();
                        telemetry.gpsAccuracy = pos.coords.accuracy;
                        telemetry.gpsStatus = pos.coords.accuracy <= 6 ? "GOOD" : (pos.coords.accuracy <= 15 ? "OK" : "POOR");

                        if (pos.coords.speed !== null && pos.coords.speed >= 0) {
                            currentSpeed = pos.coords.speed * 3.6;
                        } else if (lastLat !== null && lastGpsTime !== null) {
                            const timeDelta = (now - lastGpsTime) / 1000;
                            if (timeDelta > 0.2) {
                                const distance = calculateDistance(lastLat, lastLon, pos.coords.latitude, pos.coords.longitude);
                                const calculatedSpeedMS = distance / timeDelta;
                                if (calculatedSpeedMS >= 0.1 && calculatedSpeedMS < 75) currentSpeed = calculatedSpeedMS * 3.6;
                                if (timers.d400m.state === 1) timers.d400m.dist += distance;
                            }
                        }
                        telemetry.speed = Math.round(currentSpeed);
                        if (pos.coords.heading !== null && !isNaN(pos.coords.heading)) telemetry.gpsHeading = pos.coords.heading;

                        if (pos.coords.altitude !== null) {
                            let currentAlt = pos.coords.altitude;
                            if (lastGpsTime !== null) {
                                let dt = (now - lastGpsTime) / 1000;
                                if (dt > 0.5) {
                                    let diffAlt = currentAlt - telemetry.lastAltitude;
                                    telemetry.verticalSpeed = (telemetry.verticalSpeed * 0.7) + ((diffAlt / dt) * 0.3);
                                    let speedMS = currentSpeed / 3.6;
                                    telemetry.roadGrade = speedMS > 1 ? (telemetry.verticalSpeed / speedMS) * 100 : 0;
                                    telemetry.lastAltitude = currentAlt;
                                }
                            } else { telemetry.lastAltitude = currentAlt; }
                            telemetry.altitude = Math.round(currentAlt);
                        }
                        lastLat = pos.coords.latitude; lastLon = pos.coords.longitude; lastGpsTime = now;
                    }, (err) => { 
                        if(!isSimulating) {
                            if (err.code === err.PERMISSION_DENIED) telemetry.gpsStatus = "PERM DENIED";
                            else if (err.code === err.TIMEOUT) telemetry.gpsStatus = "TIMEOUT (INDOOR)";
                            else telemetry.gpsStatus = "LOST";
                        }
                    }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 });
                } else {
                    telemetry.gpsStatus = "NOT SUPPORTED";
                }
            } catch (geoErr) { console.log("GPS Başlatılamadı:", geoErr); }

            // Adım 3: iOS Birleşik Sensör İzin Akışı (.then() zinciri ile, kilitsiz mimari)
            try {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    // iOS Cihazları için Master Hareket İzni İstemi (Yönelimi de kapsar)
                    DeviceMotionEvent.requestPermission()
                        .then((motionPerm) => {
                            if (motionPerm === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation, true);
                                window.addEventListener('devicemotion', handleMotion, true);
                            } else {
                                telemetry.gpsStatus = "SENSOR DENIED";
                            }
                        })
                        .catch((e) => {
                            console.log('iOS İzin hatası bypass edildi:', e);
                            // Koruma Amacıyla Doğrudan Bağlamayı Dene
                            window.addEventListener('deviceorientation', handleOrientation, true);
                            window.addEventListener('devicemotion', handleMotion, true);
                        });
                } else if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    // Alternatif iOS İzin Kanalı
                    DeviceOrientationEvent.requestPermission()
                        .then((orientPerm) => {
                            if (orientPerm === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation, true);
                                window.addEventListener('devicemotion', handleMotion, true);
                            }
                        })
                        .catch((e) => console.log(e));
                } else {
                    // Android veya Masaüstü Cihazlar (İzin istemeden direkt bağla)
                    window.addEventListener('deviceorientation', handleOrientation, true);
                    window.addEventListener('devicemotion', handleMotion, true);
                }
            } catch (e) {
                console.log('Sensör katmanı hatası yutuldu, yedek hat devrede:', e);
                window.addEventListener('deviceorientation', handleOrientation, true);
                window.addEventListener('devicemotion', handleMotion, true);
            }
        });

        function handleOrientation(event) {
            if (isSimulating || event.beta === null || event.gamma === null) return;
            telemetry.rawPitch = event.beta; telemetry.rawRoll = event.gamma;
            if (!isCalibrated) { offset.pitch = event.beta; offset.roll = event.gamma; isCalibrated = true; }
            let relativePitch = event.beta - offset.pitch; let relativeRoll = event.gamma - offset.roll;
            let filterFactor = telemetry.speed < 5 ? 0.20 : 0.04;
            telemetry.pitch = (telemetry.pitch * (1 - filterFactor)) + (relativePitch * filterFactor);
            telemetry.roll = (telemetry.roll * (1 - filterFactor)) + (relativeRoll * filterFactor);
            
            if (event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) {
                telemetry.compassHeading = event.webkitCompassHeading;
            } else if (event.alpha !== null) {
                telemetry.compassHeading = 360 - event.alpha;
            }
            telemetry.horizonQuality = (Math.abs(telemetry.pitch) > 45 || Math.abs(telemetry.roll) > 50) ? "DEGRADED" : "OK";
        }

        function handleMotion(event) {
            if (isSimulating || !event.accelerationIncludingGravity) return;
            let acc = event.accelerationIncludingGravity;
            if (offset.ax === 0 && offset.ay === 0) { offset.ax = acc.x; offset.ay = acc.y; offset.az = acc.z - 9.81; return; }
            telemetry.lateralX = acc.x; telemetry.longitudinalY = acc.y;
            telemetry.latG = (telemetry.latG * 0.85) + (((acc.x - offset.ax) / 9.81) * 0.15);
            telemetry.lonG = (telemetry.lonG * 0.85) + (((acc.y - offset.ay) / 9.81) * 0.15);
            telemetry.vertG = (telemetry.vertG * 0.85) + (((acc.z - offset.az) / 9.81) * 0.15);
        }

        calibrateBtn.addEventListener('click', () => {
            if (isSimulating) return;
            offset.pitch = telemetry.rawPitch; offset.roll = telemetry.rawRoll;
            offset.ax = telemetry.lateralX || 0; offset.ay = telemetry.longitudinalY || 0; isCalibrated = true;
        });

        streamBtn.addEventListener('click', () => {
            isStreaming = !isStreaming;
            if (isStreaming) {
                streamBuffer = []; lastSendTime = Date.now();
                streamBtn.classList.add('streaming-active'); streamBtn.innerText = "YAYIN AKTİF";
            } else {
                streamBtn.classList.remove('streaming-active'); streamBtn.innerText = "CANLI YAYIN BAŞLAT";
            }
        });

        lapBtn.addEventListener('click', () => {
            let currentLapTime = (Date.now() - timers.lapStart) / 1000; timers.currentLap = currentLapTime;
            if (timers.bestLap === 0 || currentLapTime < timers.bestLap) timers.bestLap = currentLapTime;
            timers.lapStart = Date.now();
        });

        function formatLapTime(sec) {
            if (sec === 0) return "--:--.---";
            let m = Math.floor(sec / 60); let s = Math.floor(sec % 60); let ms = Math.floor((sec % 1) * 1000);
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
        }

        function updateTimers() {
            let speed = telemetry.speed; let now = Date.now();
            if (speed > 0.5 && timers.p0_100.state === 0) { timers.p0_100.start = now; timers.p0_100.state = 1; timers.d400m.start = now; timers.d400m.state = 1; timers.d400m.dist = 0; }
            if (timers.p0_100.state === 1) { timers.p0_100.time = (now - timers.p0_100.start) / 1000; if (speed >= 100) { timers.p0_100.state = 2; timers.p100_200.start = now; timers.p100_200.state = 1; } }
            if (timers.p100_200.state === 1) { timers.p100_200.time = (now - timers.p100_200.start) / 1000; if (speed >= 200) timers.p100_200.state = 2; if (speed < 90) timers.p100_200.state = 0; }
            if (timers.d400m.state === 1) { timers.d400m.time = (now - timers.d400m.start) / 1000; if (timers.d400m.dist >= 400) timers.d400m.state = 2; }
            if (speed === 0 && (timers.p0_100.state === 2 || timers.d400m.state === 2)) { timers.p0_100.state = 0; timers.p100_200.state = 0; timers.d400m.state = 0; }
        }

        function handleLiveStreaming(now) {
            if (!isStreaming) return;
            if (now - lastSampleTime >= 1000) {
                streamBuffer.push({
                    time: new Date().toLocaleTimeString('tr-TR'),
                    pitch: telemetry.pitch.toFixed(2), roll: telemetry.roll.toFixed(2),
                    speed: telemetry.speed, heading: Math.round(telemetry.heading), alt: telemetry.altitude,
                    latG: telemetry.latG.toFixed(3), lonG: telemetry.lonG.toFixed(3), vertG: telemetry.vertG.toFixed(3),
                    grade: telemetry.roadGrade.toFixed(1)
                });
                lastSampleTime = now;
            }
            if (now - lastSendTime >= 3000 && streamBuffer.length > 0) {
                const payload = JSON.stringify(streamBuffer); streamBuffer = []; lastSendTime = now;
                fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain" }, body: payload }).catch(e => console.log(e));
            }
        }

        function animate() {
            const w = window.innerWidth; const h = window.innerHeight; const theme = THEMES[currentThemeIdx];
            let now = Date.now(); let dt = (now - lastUpdateTime) / 1000; lastUpdateTime = now;

            if (isSimulating) {
                let simTime = now / 1000;
                telemetry.speed = Math.round(85 + 50 * Math.sin(simTime * 0.4));
                telemetry.compassHeading = (simTime * 15) % 360;
                telemetry.pitch = 4 * Math.sin(simTime * 0.5);
                telemetry.roll = 25 * Math.cos(simTime * 0.35); 
                telemetry.lonG = 0.4 * Math.cos(simTime * 0.4);
                telemetry.latG = -0.8 * Math.sin(simTime * 0.35); 
                telemetry.altitude = Math.round(150 + 15 * Math.sin(simTime * 0.1));
                telemetry.verticalSpeed = 1 * Math.cos(simTime * 0.1);
                telemetry.roadGrade = (telemetry.verticalSpeed / ((telemetry.speed/3.6)||1)) * 100;
                telemetry.gpsStatus = "GOOD"; telemetry.gpsAccuracy = 1.0; telemetry.heading = telemetry.compassHeading; telemetry.sensorType = "SIMULATION";
            } else {
                let correctedCompass = telemetry.compassHeading;
                if (window.innerWidth < window.innerHeight) {
                    correctedCompass = (correctedCompass + 90) % 360;
                }
                if (telemetry.speed > 12 && telemetry.gpsHeading !== null) {
                    telemetry.heading = telemetry.gpsHeading; telemetry.sensorType = "GPS TRACK";
                } else {
                    telemetry.heading = correctedCompass; telemetry.sensorType = "MAG HEADING";
                }
            }

            if (dt > 0 && !isSimulating) {
                let hdgDiff = telemetry.heading - telemetry.lastHeading;
                if (hdgDiff > 180) hdgDiff -= 360; if (hdgDiff < -180) hdgDiff += 360;
                telemetry.yawRate = (telemetry.yawRate * 0.8) + ((hdgDiff / dt) * 0.2); telemetry.lastHeading = telemetry.heading;
                let omega = Math.abs(telemetry.yawRate) * Math.PI / 180; let speedMS = telemetry.speed / 3.6;
                telemetry.radius = (omega > 0.01 && speedMS > 2) ? Math.round(speedMS / omega) : 0;
            }

            handleLiveStreaming(now); updateTimers();

            telemetry.warnings = [];
            if (!isSimulating) {
                if (telemetry.gpsStatus.includes("LOST") || telemetry.gpsStatus.includes("TIMEOUT")) telemetry.warnings.push("GPS LOST / NO SATELLITE");
                if (telemetry.gpsStatus.includes("DENIED")) telemetry.warnings.push("LOCATION PERMISSION DENIED");
                if (telemetry.horizonQuality === "DEGRADED") telemetry.warnings.push("ATT DEGRADED");
                if (!isCalibrated) telemetry.warnings.push("CALIBRATION NEEDED");
            }

            ctx.clearRect(0, 0, w, h); ctx.save();
            let vW, vH; let isPortraitSimulated = false;

            if (w < h) { ctx.translate(w / 2, h / 2); ctx.rotate(Math.PI / 2); vW = h; vH = w; isPortraitSimulated = true; } 
            else { ctx.translate(w / 2, h / 2); vW = w; vH = h; }

            let tapeH = vH * 0.55; 
            let leftTapeX = -vW / 2 + (isPortraitSimulated ? 42 : 55);
            let rightTapeX = vW / 2 - 60 - (isPortraitSimulated ? 42 : 55);

            // --- 1. COMPASS RIBBON ---
            let ribbonY = -vH / 2 + (isPortraitSimulated ? 35 : 20);
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(-vW/3, ribbonY, (vW/3)*2, 22);
            ctx.strokeStyle = theme.main; ctx.lineWidth = 1.5; ctx.strokeRect(-vW/3, ribbonY, (vW/3)*2, 22);
            ctx.save(); ctx.beginPath(); ctx.rect(-vW/3, ribbonY, (vW/3)*2, 22); ctx.clip();
            ctx.fillStyle = theme.main; ctx.textAlign = "center"; ctx.font = "bold 11px monospace";
            let centerHdg = telemetry.heading; let pxPerDeg = 2.5;
            for (let hDeg = Math.floor(centerHdg - 40); hDeg <= centerHdg + 40; hDeg++) {
                let normDeg = (hDeg + 360) % 360; let xPos = (hDeg - centerHdg) * pxPerDeg;
                if (normDeg % 5 === 0) {
                    let isMajor = normDeg % 10 === 0; ctx.beginPath(); ctx.moveTo(xPos, ribbonY + (isMajor ? 0 : 6)); ctx.lineTo(xPos, ribbonY + 12); ctx.stroke();
                    if (isMajor) {
                        let label = String(normDeg / 10).padStart(2, '0');
                        if (normDeg === 0) label = "N"; if (normDeg === 90) label = "E"; if (normDeg === 180) label = "S"; if (normDeg === 270) label = "W";
                        ctx.fillText(label, xPos, ribbonY + 20);
                    }
                }
            }
            ctx.restore();
            ctx.fillStyle = "#ff3333"; ctx.beginPath(); ctx.moveTo(0, ribbonY + 24); ctx.lineTo(-5, ribbonY + 31); ctx.lineTo(5, ribbonY + 31); ctx.closePath(); ctx.fill();

            // --- 2. MINIMAL ATTITUDE WIDGET ---
            let attY = ribbonY + 55;
            ctx.save(); ctx.translate(0, attY); ctx.rotate(-telemetry.roll * Math.PI / 180);
            let pShift = telemetry.pitch * 1.5;
            ctx.strokeStyle = "rgba(255,255,255,0.25)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(-30, pShift); ctx.lineTo(30, pShift); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(-15, pShift - 10); ctx.lineTo(15, pShift - 10); ctx.moveTo(-15, pShift + 10); ctx.lineTo(15, pShift + 10); ctx.stroke(); 
            ctx.restore();
            ctx.strokeStyle = theme.main; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-35, attY); ctx.lineTo(-15, attY); ctx.lineTo(-11, attY + 4); ctx.moveTo(35, attY); ctx.lineTo(15, attY); ctx.lineTo(11, attY + 4); ctx.moveTo(-2, attY); ctx.lineTo(2, attY); ctx.stroke();
            ctx.fillStyle = theme.main; ctx.font = "9px monospace"; ctx.textAlign = "center";
            ctx.fillText(`P: ${telemetry.pitch >= 0 ? '+' : ''}${Math.round(telemetry.pitch)}°  R: ${Math.round(telemetry.roll)}°`, 0, attY - 18);

            // --- 3. TRACTION CIRCLE & G-BALL ---
            let gX = 0; let gY = attY + 95; let gBallRadius = 65;
            ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(gX, gY, gBallRadius * 0.33, 0, 2*Math.PI); ctx.stroke();
            ctx.beginPath(); ctx.arc(gX, gY, gBallRadius * 0.66, 0, 2*Math.PI); ctx.stroke();
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.beginPath(); ctx.arc(gX, gY, gBallRadius, 0, 2*Math.PI); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(gX - gBallRadius, gY); ctx.lineTo(gX + gBallRadius, gY); ctx.moveTo(gX, gY - gBallRadius); ctx.lineTo(gX, gY + gBallRadius); ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.font = "7px monospace"; ctx.textAlign = "center";
            ctx.fillText("0.5G", gX, gY - (gBallRadius*0.33) + 2); ctx.fillText("1.0G", gX, gY - (gBallRadius*0.66) + 2); ctx.fillText("1.5G", gX, gY - gBallRadius + 2);
            let ballX = gX - (telemetry.latG * (gBallRadius / 1.5)); 
            let ballY = gY + (telemetry.lonG * (gBallRadius / 1.5));
            ctx.strokeStyle = "#ff0055"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(gX, gY); ctx.lineTo(ballX, ballY); ctx.stroke();
            ctx.fillStyle = "#ff0055"; ctx.beginPath(); ctx.arc(ballX, ballY, 5, 0, 2*Math.PI); ctx.fill();
            ctx.fillStyle = theme.main; ctx.font = "bold 11px monospace"; ctx.textAlign = "right";
            ctx.fillText(`LAT G: ${telemetry.latG.toFixed(2)}`, -gBallRadius - 10, gY + 4);
            ctx.textAlign = "left"; ctx.fillText(`LON G: ${telemetry.lonG.toFixed(2)}`, gBallRadius + 10, gY + 4);

            // --- 4. SLIP / SKID INDICATOR ---
            let slipY = gY + gBallRadius + 22;
            ctx.strokeStyle = theme.main; ctx.lineWidth = 1.5;
            ctx.strokeRect(gX - 50, slipY, 100, 7);
            ctx.beginPath(); ctx.moveTo(gX - 16, slipY); ctx.lineTo(gX - 16, slipY + 7); ctx.moveTo(gX + 16, slipY); ctx.lineTo(gX + 16, slipY + 7); ctx.stroke(); 
            let slipBallX = gX - (telemetry.latG * 40);
            slipBallX = Math.max(gX - 46, Math.min(gX + 46, slipBallX));
            ctx.fillStyle = theme.main; ctx.beginPath(); ctx.arc(slipBallX, slipY + 3.5, 3, 0, 2*Math.PI); ctx.fill();
            ctx.font = "bold 8px monospace"; ctx.textAlign = "center"; ctx.fillText("SLIP / SKID", gX, slipY - 4);

            // --- 5. YAW / RADIUS ---
            let driftInfoY = slipY + 25;
            ctx.fillStyle = "#00ffff"; ctx.font = "10px monospace"; ctx.textAlign = "center";
            let radiusStr = (telemetry.radius > 0 && telemetry.radius < 1500) ? `${telemetry.radius} M` : '---';
            ctx.fillText(`RADIUS: ${radiusStr}`, gX, driftInfoY);
            ctx.fillStyle = theme.main; ctx.fillText(`YAW RATE: ${Math.round(telemetry.yawRate)}°/S`, gX, driftInfoY + 11);

            // --- 6. SPEED TAPE ---
            ctx.save(); ctx.beginPath(); ctx.rect(leftTapeX, -tapeH/2, 60, tapeH); ctx.clip();
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(leftTapeX, -tapeH/2, 60, tapeH);
            ctx.strokeStyle = theme.main; ctx.strokeRect(leftTapeX, -tapeH/2, 60, tapeH);
            ctx.fillStyle = theme.main; ctx.textAlign = "right"; ctx.font = "11px monospace";
            let startSpeed = Math.floor(telemetry.speed / 10) * 10 - 30;
            for (let s = startSpeed; s <= startSpeed + 60; s += 10) { if (s < 0) continue; let sY = (telemetry.speed - s) * 3.5; ctx.beginPath(); ctx.moveTo(leftTapeX + 60, sY); ctx.lineTo(leftTapeX + 54, sY); ctx.stroke(); ctx.fillText(s, leftTapeX + 50, sY + 4); }
            ctx.restore();
            ctx.fillStyle = "black"; ctx.fillRect(leftTapeX - 5, -12, 70, 24); ctx.strokeStyle = "#ffffff"; ctx.strokeRect(leftTapeX - 5, -12, 70, 24);
            ctx.fillStyle = theme.main; ctx.font = "bold 13px monospace"; ctx.textAlign = "left"; ctx.fillText(String(telemetry.speed).padStart(3,'0'), leftTapeX + 4, 5); ctx.font = "7px monospace"; ctx.fillText("KM/H", leftTapeX + 38, 4);

            // --- 7. ALTITUDE TAPE ---
            ctx.save(); ctx.beginPath(); ctx.rect(rightTapeX, -tapeH/2, 60, tapeH); ctx.clip();
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(rightTapeX, -tapeH/2, 60, tapeH);
            ctx.strokeStyle = theme.main; ctx.strokeRect(rightTapeX, -tapeH/2, 60, tapeH);
            ctx.fillStyle = theme.main; ctx.textAlign = "left"; ctx.font = "11px monospace";
            let startAlt = Math.floor(telemetry.altitude / 20) * 20 - 40;
            for (let a = startAlt; a <= startAlt + 80; a += 20) { let aY = (telemetry.altitude - a) * 1.2; ctx.beginPath(); ctx.moveTo(rightTapeX, aY); ctx.lineTo(rightTapeX + 6, aY); ctx.stroke(); ctx.fillText(a, rightTapeX + 10, aY + 4); }
            ctx.restore();
            ctx.fillStyle = "black"; ctx.fillRect(rightTapeX - 5, -12, 70, 24); ctx.strokeStyle = "#ffffff"; ctx.strokeRect(rightTapeX - 5, -12, 70, 24);
            ctx.fillStyle = theme.main; ctx.font = "bold 11px monospace"; ctx.textAlign = "right"; ctx.fillText(telemetry.altitude + "M", rightTapeX + 60, 4);
            let vsiX = rightTapeX + 72; ctx.strokeStyle = theme.main; ctx.beginPath(); ctx.moveTo(vsiX, -25); ctx.lineTo(vsiX, 25); ctx.stroke();
            ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(vsiX, Math.max(-25, Math.min(25, -telemetry.verticalSpeed * 5)), 3, 0, 2*Math.PI); ctx.fill();

            // --- 8. TIMERS & DRAG LAP ---
            let pX = -vW / 2 + (isPortraitSimulated ? 42 : 55); let pY = vH / 2 - (isPortraitSimulated ? 95 : 110);
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(pX, pY, 145, 68); ctx.strokeStyle = theme.main; ctx.strokeRect(pX, pY, 145, 68);
            ctx.fillStyle = theme.main; ctx.font = "bold 8px monospace"; ctx.textAlign = "left";
            ctx.fillText(`0-100 KM/H : ${timers.p0_100.time.toFixed(2)}s`, pX + 6, pY + 12); ctx.fillText(`100-200 H  : ${timers.p100_200.time.toFixed(2)}s`, pX + 6, pY + 23); ctx.fillText(`400M DRAG  : ${timers.d400m.time.toFixed(2)}s (${Math.round(timers.d400m.dist)}m)`, pX + 6, pY + 34);
            ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.beginPath(); ctx.moveTo(pX, pY+39); ctx.lineTo(pX+145, pY+39); ctx.stroke();
            ctx.fillStyle = "#00ffff"; ctx.fillText(`CUR LAP: ${formatLapTime((Date.now() - timers.lapStart)/1000)}`, pX + 6, pY + 50); ctx.fillText(`BEST   : ${formatLapTime(timers.bestLap)}`, pX + 6, pY + 61);

            // --- 9. ROAD GRADE & STOPPING ---
            let rX = vW / 2 - 135 - (isPortraitSimulated ? 42 : 55);
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(rX, pY + 28, 135, 40); ctx.strokeStyle = theme.main; ctx.strokeRect(rX, pY + 28, 135, 40);
            ctx.fillStyle = theme.main; ctx.font = "8px monospace"; ctx.textAlign = "left";
            ctx.fillText(`ROAD GRADE : ${telemetry.roadGrade.toFixed(1)}%`, rX + 6, pY + 40);
            let stopDist = telemetry.speed > 3 ? Math.round((Math.pow(telemetry.speed/3.6,2))/(2*0.75*9.81)) : 0;
            ctx.fillText(`EST STOPPING: ${stopDist} M`, rX + 6, pY + 54);

            // --- 10. SYSTEM PARAMETRELERİ ---
            let statusY = -vH / 2 + (isPortraitSimulated ? 42 : 25); ctx.fillStyle = theme.main; ctx.font = "8px monospace"; ctx.textAlign = "left";
            ctx.fillText(`SRC : ${telemetry.sensorType}`, -vW/2 + 20, statusY); 
            ctx.fillText(`GPS : ${telemetry.gpsStatus} (±${telemetry.gpsAccuracy.toFixed(1)}M)`, -vW/2 + 20, statusY + 11);
            ctx.textAlign = "right"; ctx.fillText(`HORIZON: ${telemetry.horizonQuality}`, vW/2 - 20, statusY); ctx.fillText(`STREAM : ${isStreaming ? 'ONLINE' : 'OFFLINE'}`, vW/2 - 20, statusY + 11);
            
            if (telemetry.warnings.length > 0) { ctx.fillStyle = "#ff3333"; ctx.font = "bold 10px monospace"; ctx.textAlign = "center"; telemetry.warnings.forEach((warn, idx) => { ctx.fillText(`▶ ${warn} ◀`, 0, -vH/4 + (idx * 13)); }); }

            ctx.restore(); requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
