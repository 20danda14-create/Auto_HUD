<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Advanced Glass Cockpit HUD - Auto Stream Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #020202;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: var(--hud-color, #00ff00);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #canvas { display: block; width: 100%; height: 100%; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.98); z-index: 100;
        }
        button {
            background: currentColor; color: black; border: none; padding: 16px 32px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 6px;
            box-shadow: 0 0 20px currentColor; margin-bottom: 15px; font-family: monospace;
        }
        .hud-controls {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 10;
        }
        .control-btn {
            background: rgba(0, 0, 0, 0.6); color: inherit; border: 1.5px solid currentColor;
            padding: 8px 16px; font-size: 0.8rem; font-weight: bold; border-radius: 4px;
            box-shadow: 0 0 8px rgba(0,0,0,0.5); margin: 0;
        }
        .streaming-active {
            animation: blink 1.5s infinite;
            background: rgba(0, 150, 255, 0.25) !important;
            border-color: #0096ff !important;
            color: #0096ff !important;
        }
        @keyframes blink { 50% { opacity: 0.6; } }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn" style="color: #00ff00;">SİSTEMLERİ BAŞLAT</button>
        <p style="color: #666; text-align: center; font-size: 0.85rem; max-width: 80%; line-height: 1.5;">
            iPhone 14 Plus Canlı Veri Akış Modülü Aktif.<br>
            Lütfen Kararlılık ve Konum İzinlerini Onaylayın.
        </p>
    </div>

    <div class="hud-controls">
        <button id="calibrateBtn" class="control-btn">SIFIRLA</button>
        <button id="themeBtn" class="control-btn">TEMA</button>
        <button id="streamBtn" class="control-btn">CANLI YAYIN BAŞLAT</button>
        <button id="lapBtn" class="control-btn">TUR ATLA</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // ==========================================
        // ADIM 2'DE KOPYALADIĞIN WEB APP URL'SİNİ BURAYA YAPIŞTIR:
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJlLHS9oQzx6EYrHyJik7G25j0xoIUuYUKCbWpA2AKC84b7dy4cktyoPiE9Y3P-8Ce/exec";
        // ==========================================

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const themeBtn = document.getElementById('themeBtn');
        const streamBtn = document.getElementById('streamBtn');
        const lapBtn = document.getElementById('lapBtn');
        const overlay = document.getElementById('overlay');

        const THEMES = [
            { name: "MIL-GREEN", main: "#00ff00", bgSky: "rgba(0,40,0,0.15)", bgGround: "rgba(30,20,0,0.15)" },
            { name: "BOEING-AMBER", main: "#ffb000", bgSky: "rgba(45,30,0,0.15)", bgGround: "rgba(25,15,0,0.15)" },
            { name: "AIRBUS-WHITE", main: "#ffffff", bgSky: "rgba(30,30,40,0.15)", bgGround: "rgba(20,20,20,0.15)" }
        ];
        let currentThemeIdx = 0;

        let telemetry = {
            pitch: 0, rawPitch: 0, roll: 0, rawRoll: 0,
            heading: 0, gpsHeading: null, compassHeading: 0, lastHeading: 0,
            speed: 0, altitude: 0, lastAltitude: 0, latG: 0, lonG: 0, vertG: 1.0,
            gpsAccuracy: 0, gpsStatus: "SEARCHING", verticalSpeed: 0, roadGrade: 0,
            yawRate: 0, radius: 0, sensorType: "INIT", horizonQuality: "OK", warnings: []
        };

        let offset = { pitch: 90, roll: 0, ax: 0, ay: 0, az: 0 };
        let isCalibrated = false; let lastGpsTime = null; let lastLat = null; let lastLon = null;
        let lastUpdateTime = Date.now();

        let timers = {
            p0_100: { state: 0, start: 0, time: 0 },
            p100_200: { state: 0, start: 0, time: 0 },
            d400m: { state: 0, start: 0, time: 0, dist: 0 },
            currentLap: 0, bestLap: 0, lapStart: 0
        };

        // Canlı Akış Tampon Belleği ve Zaman Yönetimi
        let isStreaming = false;
        let streamBuffer = [];
        let lastSampleTime = 0;
        let lastSendTime = 0;

        function setHUDColor(idx) { document.body.style.setProperty('--hud-color', THEMES[idx].main); }
        setHUDColor(currentThemeIdx);
        themeBtn.addEventListener('click', () => { currentThemeIdx = (currentThemeIdx + 1) % THEMES.length; setHUDColor(currentThemeIdx); });

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; 
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio; canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize); resize();

        startBtn.addEventListener('click', async () => {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    let currentSpeed = 0; const now = Date.now();
                    telemetry.gpsAccuracy = pos.coords.accuracy;
                    telemetry.gpsStatus = pos.coords.accuracy <= 6 ? "GOOD" : (pos.coords.accuracy <= 15 ? "OK" : "POOR");

                    if (pos.coords.speed !== null && pos.coords.speed >= 0) {
                        currentSpeed = pos.coords.speed * 3.6;
                    } else if (lastLat !== null && lastGpsTime !== null) {
                        const timeDelta = (now - lastGpsTime) / 1000;
                        if (timeDelta > 0.2) {
                            const distance = calculateDistance(lastLat, lastLon, pos.coords.latitude, pos.coords.longitude);
                            const calculatedSpeedMS = distance / timeDelta;
                            if (calculatedSpeedMS >= 0.1 && calculatedSpeedMS < 75) currentSpeed = calculatedSpeedMS * 3.6;
                            if (timers.d400m.state === 1) timers.d400m.dist += distance;
                        }
                    }
                    telemetry.speed = Math.round(currentSpeed);
                    if (pos.coords.heading !== null && !isNaN(pos.coords.heading)) telemetry.gpsHeading = pos.coords.heading;

                    if (pos.coords.altitude !== null) {
                        let currentAlt = pos.coords.altitude;
                        if (lastGpsTime !== null) {
                            let dt = (now - lastGpsTime) / 1000;
                            if (dt > 0.5) {
                                let diffAlt = currentAlt - telemetry.lastAltitude;
                                telemetry.verticalSpeed = (telemetry.verticalSpeed * 0.7) + ((diffAlt / dt) * 0.3);
                                let speedMS = currentSpeed / 3.6;
                                telemetry.roadGrade = speedMS > 1 ? (telemetry.verticalSpeed / speedMS) * 100 : 0;
                                telemetry.lastAltitude = currentAlt;
                            }
                        } else { telemetry.lastAltitude = currentAlt; }
                        telemetry.altitude = Math.round(currentAlt);
                    }
                    lastLat = pos.coords.latitude; lastLon = pos.coords.longitude; lastGpsTime = now;
                }, (err) => { telemetry.gpsStatus = "LOST"; }, { enableHighAccuracy: true, maximumAge: 0 });
            }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    await DeviceOrientationEvent.requestPermission(); await DeviceMotionEvent.requestPermission();
                    window.addEventListener('deviceorientation', handleOrientation); window.addEventListener('devicemotion', handleMotion);
                } catch (e) { alert('Sensör reddedildi.'); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation); window.addEventListener('devicemotion', handleMotion);
            }
            overlay.style.display = 'none'; timers.lapStart = Date.now(); animate();
        });

        function handleOrientation(event) {
            if (event.beta === null || event.gamma === null) return;
            telemetry.rawPitch = event.beta; telemetry.rawRoll = event.gamma;
            if (!isCalibrated) { offset.pitch = event.beta; offset.roll = event.gamma; isCalibrated = true; }
            let relativePitch = event.beta - offset.pitch; let relativeRoll = event.gamma - offset.roll;
            let filterFactor = telemetry.speed < 5 ? 0.20 : (telemetry.speed > 100 ? 0.015 : 0.04);
            telemetry.pitch = (telemetry.pitch * (1 - filterFactor)) + (relativePitch * filterFactor);
            telemetry.roll = (telemetry.roll * (1 - filterFactor)) + (relativeRoll * filterFactor);
            if (event.webkitCompassHeading) telemetry.compassHeading = event.webkitCompassHeading;
            else if (event.alpha) telemetry.compassHeading = 360 - event.alpha;
            telemetry.horizonQuality = (Math.abs(telemetry.pitch) > 45 || Math.abs(telemetry.roll) > 50) ? "DEGRADED" : "OK";
        }

        function handleMotion(event) {
            if (!event.accelerationIncludingGravity) return;
            let acc = event.accelerationIncludingGravity;
            if (offset.ax === 0 && offset.ay === 0) { offset.ax = acc.x; offset.ay = acc.y; offset.az = acc.z - 9.81; return; }
            telemetry.lateralX = acc.x; telemetry.longitudinalY = acc.y;
            telemetry.latG = (telemetry.latG * 0.85) + (((acc.x - offset.ax) / 9.81) * 0.15);
            telemetry.lonG = (telemetry.lonG * 0.85) + (((acc.y - offset.ay) / 9.81) * 0.15);
            telemetry.vertG = (telemetry.vertG * 0.85) + (((acc.z - offset.az) / 9.81) * 0.15);
        }

        calibrateBtn.addEventListener('click', () => {
            offset.pitch = telemetry.rawPitch; offset.roll = telemetry.rawRoll;
            offset.ax = telemetry.lateralX || 0; offset.ay = telemetry.longitudinalY || 0; isCalibrated = true;
        });

        // Canlı Yayın Tetikleyici Buton Yönetimi
        streamBtn.addEventListener('click', () => {
            if(GOOGLE_SCRIPT_URL === "BURAYA_APPS_SCRIPT_DAĞITIM_URL_GELECEK") {
                alert("Lütfen önce kodun içine Google Apps Script Dağıtım URL'sini ekleyin!");
                return;
            }
            isStreaming = !isStreaming;
            if (isStreaming) {
                streamBuffer = []; lastSendTime = Date.now();
                streamBtn.classList.add('streaming-active'); streamBtn.innerText = "YAYIN AKTİF";
            } else {
                streamBtn.classList.remove('streaming-active'); streamBtn.innerText = "CANLI YAYIN BAŞLAT";
            }
        });

        lapBtn.addEventListener('click', () => {
            let currentLapTime = (Date.now() - timers.lapStart) / 1000; timers.currentLap = currentLapTime;
            if (timers.bestLap === 0 || currentLapTime < timers.bestLap) timers.bestLap = currentLapTime;
            timers.lapStart = Date.now();
        });

        function formatLapTime(sec) {
            if (sec === 0) return "--:--.---";
            let m = Math.floor(sec / 60); let s = Math.floor(sec % 60); let ms = Math.floor((sec % 1) * 1000);
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
        }

        function updateTimers() {
            let speed = telemetry.speed; let now = Date.now();
            if (speed > 0.5 && timers.p0_100.state === 0) { timers.p0_100.start = now; timers.p0_100.state = 1; timers.d400m.start = now; timers.d400m.state = 1; timers.d400m.dist = 0; }
            if (timers.p0_100.state === 1) { timers.p0_100.time = (now - timers.p0_100.start) / 1000; if (speed >= 100) { timers.p0_100.state = 2; timers.p100_200.start = now; timers.p100_200.state = 1; } }
            if (timers.p100_200.state === 1) { timers.p100_200.time = (now - timers.p100_200.start) / 1000; if (speed >= 200) timers.p100_200.state = 2; if (speed < 90) timers.p100_200.state = 0; }
            if (timers.d400m.state === 1) { timers.d400m.time = (now - timers.d400m.start) / 1000; if (timers.d400m.dist >= 400) timers.d400m.state = 2; }
            if (speed === 0 && (timers.p0_100.state === 2 || timers.d400m.state === 2)) { timers.p0_100.state = 0; timers.p100_200.state = 0; timers.d400m.state = 0; }
        }

        // AKILLI VERİ AKIŞ MOTORU (KOTA DOSTU BATCH STREAM)
        function handleLiveStreaming(now) {
            if (!isStreaming) return;

            // Her 1 saniyede bir verilerden bir örnek/enstantane al ve tampona ekle
            if (now - lastSampleTime >= 1000) {
                streamBuffer.push({
                    time: new Date().toLocaleTimeString('tr-TR'),
                    pitch: telemetry.pitch.toFixed(2),
                    roll: telemetry.roll.toFixed(2),
                    speed: telemetry.speed,
                    heading: Math.round(telemetry.heading),
                    alt: telemetry.altitude,
                    latG: telemetry.latG.toFixed(3),
                    lonG: telemetry.lonG.toFixed(3),
                    vertG: telemetry.vertG.toFixed(3),
                    grade: telemetry.roadGrade.toFixed(1)
                });
                lastSampleTime = now;
            }

            // Her 3 saniyede bir biriken 3 satırlık veriyi tek seferde Google Script'e uçur
            if (now - lastSendTime >= 3000 && streamBuffer.length > 0) {
                const payload = JSON.stringify(streamBuffer);
                streamBuffer = []; // Gönderim başladığı an yeni veriler için tamponu temizle
                lastSendTime = now;

                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", // CORS engellerini aşmak için kritik mod
                    headers: { "Content-Type": "text/plain" },
                    body: payload
                }).catch(err => console.log("Stream Hatası: ", err));
            }
        }

        function animate() {
            const w = window.innerWidth; const h = window.innerHeight; const theme = THEMES[currentThemeIdx];
            let now = Date.now(); let dt = (now - lastUpdateTime) / 1000; lastUpdateTime = now;

            if (dt > 0) {
                let hdgDiff = telemetry.heading - telemetry.lastHeading;
                if (hdgDiff > 180) hdgDiff -= 360; if (hdgDiff < -180) hdgDiff += 360;
                telemetry.yawRate = (telemetry.yawRate * 0.8) + ((hdgDiff / dt) * 0.2); telemetry.lastHeading = telemetry.heading;
                let omega = Math.abs(telemetry.yawRate) * Math.PI / 180; let speedMS = telemetry.speed / 3.6;
                telemetry.radius = (omega > 0.01 && speedMS > 2) ? Math.round(speedMS / omega) : 0;
            }

            // Yayını Yönet
            handleLiveStreaming(now);
            updateTimers();

            telemetry.warnings = [];
            if (telemetry.gpsStatus === "LOST" || telemetry.gpsStatus === "SEARCHING") telemetry.warnings.push("GPS LOST");
            if (telemetry.gpsAccuracy > 15) telemetry.warnings.push("LOW ACCURACY");
            if (telemetry.horizonQuality === "DEGRADED") telemetry.warnings.push("ATT DEGRADED");
            if (!isCalibrated) telemetry.warnings.push("CALIBRATION NEEDED");

            ctx.clearRect(0, 0, w, h); ctx.save();
            let vW, vH; let isPortraitSimulated = false;

            if (w < h) { ctx.translate(w / 2, h / 2); ctx.rotate(Math.PI / 2); vW = h; vH = w; isPortraitSimulated = true; } 
            else { ctx.translate(w / 2, h / 2); vW = w; vH = h; }

            telemetry.heading = (telemetry.speed > 10 && telemetry.gpsHeading !== null) ? telemetry.gpsHeading : telemetry.compassHeading;
            telemetry.sensorType = (telemetry.speed > 10 && telemetry.gpsHeading !== null) ? "GPS TRACK" : "MAG HEADING";

            const compassRadius = isPortraitSimulated ? (vH * 0.26) : Math.min(vW, vH) * 0.35;
            let pitchPixelsPerDegree = isPortraitSimulated ? 4 : 5.5;

            // --- 1. MODERN YAPAY UFUK ---
            ctx.save(); ctx.rotate(-telemetry.roll * Math.PI / 180);
            let pitchShift = telemetry.pitch * pitchPixelsPerDegree;
            ctx.fillStyle = theme.bgSky; ctx.fillRect(-vW, -vH * 2 + pitchShift, vW * 2, vH * 2);
            ctx.fillStyle = theme.bgGround; ctx.fillRect(-vW, pitchShift, vW * 2, vH * 2);
            ctx.strokeStyle = theme.main; ctx.fillStyle = theme.main; ctx.lineWidth = 1.5; ctx.font = "10px monospace"; ctx.textAlign = "center";
            let step = 5; let range = 25;
            for (let i = -range; i <= range; i += step) {
                if (i === 0) { ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-vW/4, pitchShift); ctx.lineTo(vW/4, pitchShift); ctx.stroke(); ctx.lineWidth = 1.5; continue; }
                let lineY = pitchShift - (i * pitchPixelsPerDegree); ctx.beginPath();
                if (i > 0) { ctx.moveTo(-35, lineY); ctx.lineTo(-10, lineY); ctx.lineTo(-10, lineY + 4); ctx.moveTo(35, lineY); ctx.lineTo(10, lineY); ctx.lineTo(10, lineY + 4); } 
                else { ctx.setLineDash([4, 4]); ctx.moveTo(-35, lineY); ctx.lineTo(-10, lineY); ctx.setLineDash([]); ctx.lineTo(-10, lineY - 4); ctx.setLineDash([4, 4]); ctx.moveTo(35, lineY); ctx.lineTo(10, lineY); ctx.setLineDash([]); ctx.lineTo(10, lineY - 4); }
                ctx.stroke(); ctx.fillText(String(i), -48, lineY + 3); ctx.fillText(String(i), 48, lineY + 3);
            }
            ctx.restore();

            // --- 2. ÜST COMPASS RIBBON VE BANK SCALE ---
            ctx.save(); let ribbonY = -vH / 2 + (isPortraitSimulated ? 35 : 20);
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(-vW/3, ribbonY, (vW/3)*2, 22);
            ctx.strokeStyle = theme.main; ctx.strokeRect(-vW/3, ribbonY, (vW/3)*2, 22);
            ctx.save(); ctx.beginPath(); ctx.rect(-vW/3, ribbonY, (vW/3)*2, 22); ctx.clip();
            ctx.fillStyle = theme.main; ctx.textAlign = "center"; ctx.font = "bold 11px monospace";
            let centerHdg = telemetry.heading; let pxPerDeg = 2.5;
            for (let hDeg = Math.floor(centerHdg - 40); hDeg <= centerHdg + 40; hDeg++) {
                let normDeg = (hDeg + 360) % 360; let xPos = (hDeg - centerHdg) * pxPerDeg;
                if (normDeg % 5 === 0) {
                    let isMajor = normDeg % 10 === 0; ctx.beginPath(); ctx.moveTo(xPos, ribbonY + (isMajor ? 0 : 6)); ctx.lineTo(xPos, ribbonY + 12); ctx.stroke();
                    if (isMajor) {
                        let label = String(normDeg / 10).padStart(2, '0');
                        if (normDeg === 0) label = "N"; if (normDeg === 90) label = "E"; if (normDeg === 180) label = "S"; if (normDeg === 270) label = "W";
                        ctx.fillText(label, xPos, ribbonY + 20);
                    }
                }
            }
            ctx.restore();
            ctx.fillStyle = "#ff3333"; ctx.beginPath(); ctx.moveTo(0, ribbonY + 24); ctx.lineTo(-5, ribbonY + 31); ctx.lineTo(5, ribbonY + 31); ctx.closePath(); ctx.fill();

            let bankRadius = compassRadius; let bankCenterY = ribbonY + 60;
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.beginPath(); ctx.arc(0, bankCenterY, bankRadius, -Math.PI*0.7, -Math.PI*0.3); ctx.stroke();
            ctx.fillStyle = theme.main; ctx.font = "9px monospace";
            [-30, -20, -10, 0, 10, 20, 30].forEach(bAngle => {
                let bRad = (bAngle - 90) * Math.PI / 180;
                let bx1 = Math.cos(bRad) * bankRadius; let by1 = Math.sin(bRad) * bankRadius + bankCenterY;
                let bx2 = Math.cos(bRad) * (bankRadius - 6); let by2 = Math.sin(bRad) * (bankRadius - 6) + bankCenterY;
                ctx.strokeStyle = theme.main; ctx.beginPath(); ctx.moveTo(bx1, by1); ctx.lineTo(bx2, by2); ctx.stroke();
                if (bAngle % 10 === 0) { let bLx = Math.cos(bRad) * (bankRadius - 14); let bLy = Math.sin(bRad) * (bankRadius - 14) + bankCenterY; ctx.fillText(Math.abs(bAngle), bLx, bLy + 3); }
            });
            ctx.save(); ctx.translate(0, bankCenterY); ctx.rotate(telemetry.roll * Math.PI / 180); ctx.fillStyle = theme.main; ctx.beginPath(); ctx.moveTo(0, -bankRadius + 2); ctx.lineTo(-4, -bankRadius + 9); ctx.lineTo(4, -bankRadius + 9); ctx.closePath(); ctx.fill(); ctx.restore(); ctx.restore();

            // --- 3. FIX VE FLIGHT PATH VECTOR ---
            ctx.strokeStyle = theme.main; ctx.lineWidth = 2.5; ctx.beginPath();
            ctx.moveTo(-25, 0); ctx.lineTo(-10, 0); ctx.lineTo(-6, 5); ctx.moveTo(25, 0); ctx.lineTo(10, 0); ctx.lineTo(6, 5); ctx.moveTo(-3, 0); ctx.lineTo(3, 0); ctx.moveTo(0, -3); ctx.lineTo(0, 3); ctx.stroke();

            ctx.save(); ctx.translate(-telemetry.latG * 65, telemetry.lonG * 45); ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, 7, 0, 2*Math.PI); ctx.moveTo(-7, 0); ctx.lineTo(-15, 0); ctx.moveTo(7, 0); ctx.lineTo(15, 0); ctx.moveTo(0, -7); ctx.lineTo(0, -12); ctx.stroke(); ctx.restore();

            // --- 4. SOL SÜRAT BANDI & STOP DIST ---
            const tapeW = 60; const tapeH = vH * 0.52; const leftTapeX = -vW / 2 + (isPortraitSimulated ? 42 : 55);
            ctx.save(); ctx.beginPath(); ctx.rect(leftTapeX, -tapeH/2, tapeW, tapeH); ctx.clip(); ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(leftTapeX, -tapeH/2, tapeW, tapeH); ctx.strokeStyle = theme.main; ctx.strokeRect(leftTapeX, -tapeH/2, tapeW, tapeH);
            ctx.fillStyle = theme.main; ctx.textAlign = "right"; ctx.font = "11px monospace";
            let startSpeed = Math.floor(telemetry.speed / 10) * 10 - 30;
            for (let s = startSpeed; s <= startSpeed + 60; s += 10) { if (s < 0) continue; let sY = (telemetry.speed - s) * 3.5; ctx.beginPath(); ctx.moveTo(leftTapeX + tapeW, sY); ctx.lineTo(leftTapeX + tapeW - 6, sY); ctx.stroke(); ctx.fillText(s, leftTapeX + tapeW - 10, sY + 4); }
            ctx.restore();
            ctx.fillStyle = "black"; ctx.fillRect(leftTapeX - 5, -12, tapeW + 10, 24); ctx.strokeStyle = "#ffffff"; ctx.strokeRect(leftTapeX - 5, -12, tapeW + 10, 24);
            ctx.fillStyle = theme.main; ctx.font = "bold 13px monospace"; ctx.textAlign = "left"; ctx.fillText(String(telemetry.speed).padStart(3,'0'), leftTapeX + 4, 5); ctx.font = "7px monospace"; ctx.fillText("KM/H", leftTapeX + 36, 4);

            let barX = leftTapeX + tapeW + 8; ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.strokeRect(barX, -30, 8, 60);
            if (telemetry.lonG < 0) { ctx.fillStyle = "#ff0000"; ctx.fillRect(barX, 0, 8, Math.min(Math.abs(telemetry.lonG) * 50, 30)); } 
            else if (telemetry.lonG > 0) { ctx.fillStyle = "#00ff00"; ctx.fillRect(barX, -Math.min(telemetry.lonG * 50, 30), 8, Math.min(telemetry.lonG * 50, 30)); }
            ctx.fillStyle = theme.main; ctx.font = "8px monospace"; ctx.fillText(`STOP EST: ${telemetry.speed > 3 ? Math.round((Math.pow(telemetry.speed/3.6,2))/(2*0.75*9.81)) : 0}M`, leftTapeX, tapeH/2 + 14);

            // --- 5. SAĞ ALTIMETRE & VS ---
            const rightTapeX = vW / 2 - tapeW - (isPortraitSimulated ? 42 : 55);
            ctx.save(); ctx.beginPath(); ctx.rect(rightTapeX, -tapeH/2, tapeW, tapeH); ctx.clip(); ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(rightTapeX, -tapeH/2, tapeW, tapeH); ctx.strokeStyle = theme.main; ctx.strokeRect(rightTapeX, -tapeH/2, tapeW, tapeH);
            ctx.fillStyle = theme.main; ctx.textAlign = "left"; ctx.font = "11px monospace";
            let startAlt = Math.floor(telemetry.altitude / 20) * 20 - 40;
            for (let a = startAlt; a <= startAlt + 80; a += 20) { let aY = (telemetry.altitude - a) * 1.2; ctx.beginPath(); ctx.moveTo(rightTapeX, aY); ctx.lineTo(rightTapeX + 6, aY); ctx.stroke(); ctx.fillText(a, rightTapeX + 10, aY + 4); }
            ctx.restore();
            ctx.fillStyle = "black"; ctx.fillRect(rightTapeX - 5, -12, tapeW + 10, 24); ctx.strokeStyle = "#ffffff"; ctx.strokeRect(rightTapeX - 5, -12, tapeW + 10, 24);
            ctx.fillStyle = theme.main; ctx.font = "bold 11px monospace"; ctx.textAlign = "right"; ctx.fillText(telemetry.altitude + "M", rightTapeX + tapeW - 4, 5);

            let vsiX = rightTapeX - 12; ctx.strokeStyle = theme.main; ctx.beginPath(); ctx.moveTo(vsiX, -25); ctx.lineTo(vsiX, 25); ctx.stroke();
            ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(vsiX, Math.max(-25, Math.min(25, -telemetry.verticalSpeed * 5)), 3, 0, 2*Math.PI); ctx.fill();
            ctx.font = "8px monospace"; ctx.textAlign = "right"; ctx.fillText(`GRADE: ${telemetry.roadGrade.toFixed(1)}%`, rightTapeX + tapeW, tapeH/2 + 14);

            // --- 6. PERFORMANCE BOX ---
            let pX = -vW / 2 + (isPortraitSimulated ? 42 : 55); let pY = vH / 2 - (isPortraitSimulated ? 95 : 110);
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(pX, pY, 150, 68); ctx.strokeStyle = theme.main; ctx.strokeRect(pX, pY, 150, 68);
            ctx.fillStyle = theme.main; ctx.font = "bold 8px monospace"; ctx.textAlign = "left";
            ctx.fillText(`0-100 KM/H : ${timers.p0_100.time.toFixed(2)}s`, pX + 6, pY + 12); ctx.fillText(`100-200 H  : ${timers.p100_200.time.toFixed(2)}s`, pX + 6, pY + 23); ctx.fillText(`400M DRAG  : ${timers.d400m.time.toFixed(2)}s (${Math.round(timers.d400m.dist)}m)`, pX + 6, pY + 34);
            ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.beginPath(); ctx.moveTo(pX, pY+39); ctx.lineTo(pX+150, pY+39); ctx.stroke();
            ctx.fillStyle = "#00ffff"; ctx.fillText(`CUR LAP: ${formatLapTime((Date.now() - timers.lapStart)/1000)}`, pX + 6, pY + 50); ctx.fillText(`BEST   : ${formatLapTime(timers.bestLap)}`, pX + 6, pY + 61);

            // --- 7. TRACTION CIRCLE & SLIP INDICATOR ---
            let gBallRadius = 30; let gX = vW / 2 - gBallRadius - (isPortraitSimulated ? 45 : 60); let gY = vH / 2 - gBallRadius - (isPortraitSimulated ? 75 : 95);
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(gX, gY, gBallRadius, 0, 2*Math.PI); ctx.stroke(); ctx.beginPath(); ctx.arc(gX, gY, gBallRadius/2, 0, 2*Math.PI); ctx.stroke(); ctx.beginPath(); ctx.moveTo(gX - gBallRadius, gY); ctx.lineTo(gX + gBallRadius, gY); ctx.stroke(); ctx.beginPath(); ctx.moveTo(gX, gY - gBallRadius); ctx.lineTo(gX, gY + gBallRadius); ctx.stroke();
            let ballX = gX - (telemetry.latG * gBallRadius); let ballY = gY + (telemetry.lonG * gBallRadius);
            ctx.fillStyle = "#ff0055"; ctx.beginPath(); ctx.arc(ballX, ballY, 4, 0, 2*Math.PI); ctx.fill();
            ctx.fillStyle = theme.main; ctx.font = "8px monospace"; ctx.textAlign = "right"; ctx.fillText(`LAT G: ${telemetry.latG.toFixed(2)}`, gX + gBallRadius, gY - gBallRadius - 16); ctx.fillText(`LON G: ${telemetry.lonG.toFixed(2)}`, gX + gBallRadius, gY - gBallRadius - 6);
            let slipY = gY + gBallRadius + 12; ctx.strokeStyle = theme.main; ctx.strokeRect(gX - 25, slipY, 50, 6);
            ctx.beginPath(); ctx.moveTo(gX - 8, slipY); ctx.lineTo(gX - 8, slipY + 6); ctx.moveTo(gX + 8, slipY); ctx.lineTo(gX + 8, slipY + 6); ctx.stroke();
            ctx.fillStyle = theme.main; ctx.beginPath(); ctx.arc(Math.max(gX - 22, Math.min(gX + 22, gX - (telemetry.latG * 20))), slipY + 3, 2.5, 0, 2*Math.PI); ctx.fill();
            ctx.textAlign = "center"; ctx.fillText(`R: ${telemetry.radius > 0 && telemetry.radius < 2000 ? telemetry.radius + 'm' : '---'}`, gX, slipY + 22); ctx.fillText(`YAW: ${Math.round(telemetry.yawRate)}°/s`, gX, slipY + 32);

            // --- 8. SYSTEM STATUS & WARNINGS ---
            let statusY = -vH / 2 + (isPortraitSimulated ? 42 : 25); ctx.fillStyle = theme.main; ctx.font = "8px monospace"; ctx.textAlign = "left";
            ctx.fillText(`SRC : ${telemetry.sensorType}`, -vW/2 + 20, statusY); ctx.fillText(`ACC : ±${telemetry.gpsAccuracy.toFixed(1)}M (${telemetry.gpsStatus})`, -vW/2 + 20, statusY + 11);
            ctx.textAlign = "right"; ctx.fillText(`HORIZON: ${telemetry.horizonQuality}`, vW/2 - 20, statusY); ctx.fillText(`STREAM : ${isStreaming ? 'ONLINE' : 'OFFLINE'}`, vW/2 - 20, statusY + 11);
            if (telemetry.warnings.length > 0) { ctx.fillStyle = "#ff0000"; ctx.font = "bold 11px monospace"; ctx.textAlign = "center"; telemetry.warnings.forEach((warn, idx) => { ctx.fillText(`▶ ${warn} ◀`, 0, -vH/4 + (idx * 15)); }); }

            ctx.restore(); requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
