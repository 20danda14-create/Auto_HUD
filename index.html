<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Advanced Glass Cockpit HUD - iPhone 14 Plus Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #030303;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: #00ff00;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95);
            z-index: 10;
        }
        button {
            background: #00ff00; color: black;
            border: none; padding: 15px 30px;
            font-size: 1.2rem; font-weight: bold;
            cursor: pointer; border-radius: 5px;
            box-shadow: 0 0 15px #00ff00;
            margin-bottom: 15px;
        }
        #calibrateBtn {
            position: absolute;
            bottom: 30px; right: 30px;
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00; border: 1.5px solid #00ff00;
            padding: 12px 22px; font-size: 0.9rem; font-weight: bold;
            z-index: 5; border-radius: 6px;
            box-shadow: 0 0 10px rgba(0,255,0,0.2);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn">SİSTEMLERİ BAŞLAT</button>
        <p style="color: #888; text-align: center; font-size: 0.9rem; max-width: 80%; line-height: 1.4;">
            iPhone 14 Plus Donanım Optimizasyonu Aktif.<br>
            Lütfen konum ve hareket sensörü izinlerini onaylayın.
        </p>
    </div>

    <button id="calibrateBtn">CAYRO SIFIRLA</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const overlay = document.getElementById('overlay');

        // Telemetri Yapısı
        let telemetry = {
            pitch: 0, rawPitch: 0,
            roll: 0, rawRoll: 0,
            heading: 0, gpsHeading: null, compassHeading: 0,
            speed: 0, altitude: 0,
            sensorType: "INIT"
        };

        let offset = { pitch: 90, roll: 0 }; // Standart dik duruş varsayılanı
        let isCalibrated = false;
        let lastGpsTime = null;
        let lastLat = null;
        let lastLon = null;

        // Kararlı Mesafe Hesaplayıcı (Haversine)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize);
        resize();

        startBtn.addEventListener('click', async () => {
            // Gelişmiş ve Kesintisiz GPS Takibi
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    let currentSpeed = 0;
                    const now = Date.now();

                    if (pos.coords.speed !== null && pos.coords.speed >= 0) {
                        currentSpeed = pos.coords.speed * 3.6;
                    } else if (lastLat !== null && lastGpsTime !== null) {
                        // iOS için Gelişmiş Yedek Sürat Algoritması
                        const timeDelta = (now - lastGpsTime) / 1000;
                        if (timeDelta > 0.3) {
                            const distance = calculateDistance(lastLat, lastLon, pos.coords.latitude, pos.coords.longitude);
                            const calculatedSpeedMS = distance / timeDelta;
                            // Gerçekçi hız limitleri (0.5 km/h - 250 km/h arası geçişler)
                            if (calculatedSpeedMS >= 0.1 && calculatedSpeedMS < 70) {
                                currentSpeed = calculatedSpeedMS * 3.6;
                            }
                        }
                    }
                    
                    // Verileri süzerek yazdır
                    telemetry.speed = Math.round(currentSpeed);
                    if (pos.coords.heading !== null && !isNaN(pos.coords.heading)) {
                        telemetry.gpsHeading = pos.coords.heading;
                    }
                    if (pos.coords.altitude !== null) {
                        telemetry.altitude = Math.round(pos.coords.altitude);
                    }

                    lastLat = pos.coords.latitude;
                    lastLon = pos.coords.longitude;
                    lastGpsTime = now;
                }, (err) => console.log("GPS Hatası:", err), { 
                    enableHighAccuracy: true, 
                    maximumAge: 0
                });
            }

            // Hareket Sensör İzinleri (iOS Safari)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    await DeviceOrientationEvent.requestPermission();
                    window.addEventListener('deviceorientation', handleOrientation);
                } catch (e) { alert('Sensör izni reddedildi.'); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
            overlay.style.display = 'none';
            animate();
        });

        // Araç İçi Titreşimleri Sönümleyen Kararlı Filtre (Low-Pass Filter)
        function handleOrientation(event) {
            if (event.beta === null || event.gamma === null) return;

            // iPhone dik tutulurken: beta = Yunuslama (Pitch), gamma = Yalpalama (Roll)
            let rawPitch = event.beta;
            let rawRoll = event.gamma;

            telemetry.rawPitch = rawPitch;
            telemetry.rawRoll = rawRoll;

            if (!isCalibrated) {
                offset.pitch = rawPitch;
                offset.roll = rawRoll;
                isCalibrated = true;
            }

            let relativePitch = rawPitch - offset.pitch;
            let relativeRoll = rawRoll - offset.roll;

            // %96 oranında sönümleme filtresi uygulayarak motor ve yol sarsıntılarını tamamen yok ediyoruz
            telemetry.pitch = (telemetry.pitch * 0.96) + (relativePitch * 0.04);
            telemetry.roll = (telemetry.roll * 0.96) + (relativeRoll * 0.04);

            // Pusula Yönetimi
            if (event.webkitCompassHeading) {
                telemetry.compassHeading = event.webkitCompassHeading;
            } else if (event.alpha) {
                telemetry.compassHeading = 360 - event.alpha;
            }
        }

        calibrateBtn.addEventListener('click', () => {
            offset.pitch = telemetry.rawPitch;
            offset.roll = telemetry.rawRoll;
        });

        function animate() {
            const w = window.innerWidth;
            const h = window.innerHeight;

            ctx.clearRect(0, 0, w, h);
            ctx.save();

            let vW, vH, cx = 0, cy = 0;
            let isPortraitSimulated = false;

            // iPhone Dik Moddayken Ekranı 90 Derece Döndürme Matrisi
            if (w < h) {
                ctx.translate(w / 2, h / 2);
                ctx.rotate(Math.PI / 2);
                vW = h;
                vH = w;
                isPortraitSimulated = true;
            } else {
                ctx.translate(w / 2, h / 2);
                vW = w;
                vH = h;
            }

            // Hibrit Rota Seçimi
            if (telemetry.speed > 8 && telemetry.gpsHeading !== null) {
                telemetry.heading = telemetry.gpsHeading;
                telemetry.sensorType = "GPS NAV";
            } else {
                telemetry.heading = telemetry.compassHeading;
                telemetry.sensorType = "MAG COMP";
            }

            // --- IPHONE 14 PLUS KAVİSLERİ İÇİN GÜVENLİ ALAN ÖLÇEKLENDİRMESİ ---
            // vH (428px) cihazın kısa kenarıdır. Kadranı ekrana %100 sığdırmak için katsayıyı 0.28'e düşürdük.
            const compassRadius = isPortraitSimulated ? (vH * 0.28) : Math.min(vW, vH) * 0.38;
            const headingBoxOffset = isPortraitSimulated ? 20 : 28;

            // --- 1. YAPAY UFUK CHİZGİLERİ VE ARKA PLAN ---
            ctx.save();
            ctx.rotate(-telemetry.roll * Math.PI / 180);
            
            let pitchPixels = telemetry.pitch * (isPortraitSimulated ? 3.5 : 5);

            // Gökyüzü ve Yer Renk Blokları
            ctx.fillStyle = "#0c2840"; 
            ctx.fillRect(-vW, -vH * 2 + pitchPixels, vW * 2, vH * 2);
            ctx.fillStyle = "#3d250e"; 
            ctx.fillRect(-vW, pitchPixels, vW * 2, vH * 2);

            // Ana Ufuk Çizgisi
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-vW/3, pitchPixels);
            ctx.lineTo(vW/3, pitchPixels);
            ctx.stroke();

            // Pitch Derece Çizgileri
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "rgba(255,255,255,0.35)";
            ctx.lineWidth = 1;
            ctx.font = "10px monospace";
            ctx.textAlign = "center";

            let step = 10;
            let range = 30;
            for(let i = -range; i <= range; i += step) {
                if(i === 0) continue;
                let lineY = pitchPixels - (i * (isPortraitSimulated ? 3.5 : 5));
                ctx.beginPath();
                ctx.moveTo(-25, lineY); ctx.lineTo(25, lineY);
                ctx.stroke();
                ctx.fillText(i, -38, lineY + 3);
                ctx.fillText(i, 38, lineY + 3);
            }
            ctx.restore();

            // --- 2. SABİT UÇAK HUD SEMBOLÜ ---
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            let wingSize = isPortraitSimulated ? 45 : 65;
            let innerWing = isPortraitSimulated ? 18 : 25;
            ctx.moveTo(cx - wingSize, cy); ctx.lineTo(cx - innerWing, cy); ctx.lineTo(cx - innerWing + 6, cy + 6);
            ctx.moveTo(cx - 3, cy); ctx.lineTo(cx + 3, cy); ctx.moveTo(cx, cy - 3); ctx.lineTo(cx, cy + 3);
            ctx.moveTo(cx + wingSize, cy); ctx.lineTo(cx + innerWing, cy); ctx.lineTo(cx + innerWing - 6, cy + 6);
            ctx.stroke();

            // --- 3. DİNAMİK PUSULA ÇEMBERİ (TAŞMAZ) ---
            ctx.save();
            ctx.rotate(-telemetry.heading * Math.PI / 180);

            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, compassRadius, 0, 2 * Math.PI);
            ctx.stroke();

            ctx.fillStyle = "#00ff00";
            ctx.font = "bold 10px monospace";
            ctx.textAlign = "center";

            for (let deg = 0; deg < 360; deg += 10) {
                let rad = deg * Math.PI / 180;
                let tickLen = 6;
                let x1 = cx + Math.sin(rad) * compassRadius;
                let y1 = cy - Math.cos(rad) * compassRadius;
                let x2 = cx + Math.sin(rad) * (compassRadius - tickLen);
                let y2 = cy - Math.cos(rad) * (compassRadius - tickLen);

                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

                if (deg % 30 === 0) {
                    let headingLabel = deg;
                    if (deg === 0) headingLabel = "N";
                    if (deg === 90) headingLabel = "E";
                    if (deg === 180) headingLabel = "S";
                    if (deg === 270) headingLabel = "W";

                    let textDist = 14;
                    let lx = cx + Math.sin(rad) * (compassRadius - textDist);
                    let ly = cy - Math.cos(rad) * (compassRadius - textDist);
                    
                    ctx.save();
                    ctx.translate(lx, ly);
                    ctx.rotate(rad);
                    ctx.fillText(headingLabel, 0, 3);
                    ctx.restore();
                }
            }
            ctx.restore();

            // Sabit Referans Oku (Tepe Noktası)
            ctx.fillStyle = "#ff3333";
            ctx.beginPath();
            ctx.moveTo(cx, cy - compassRadius - 2);
            ctx.lineTo(cx - 5, cy - compassRadius - 10);
            ctx.lineTo(cx + 5, cy - compassRadius - 10);
            ctx.closePath(); ctx.fill();

            // Üst Dijital İstikamet Kutusu
            let boxW = 44; let boxH = 16;
            ctx.fillStyle = "black";
            ctx.fillRect(cx - boxW/2, cy - compassRadius - headingBoxOffset - boxH/2, boxW, boxH);
            ctx.strokeStyle = "#00ff00";
            ctx.strokeRect(cx - boxW/2, cy - compassRadius - headingBoxOffset - boxH/2, boxW, boxH);
            ctx.fillStyle = "#00ff00";
            ctx.font = "bold 11px monospace";
            ctx.fillText(String(Math.round(telemetry.heading)).padStart(3, '0') + "°", cx, cy - compassRadius - headingBoxOffset + 4);


            // --- 4. SOL SÜRAT BANDI (GÜVENLİ ALANA ÇEKİLDİ) ---
            const tapeW = isPortraitSimulated ? 50 : 70;
            const tapeH = vH * 0.6;
            // Güvenli alan için kenardan mesafeyi artırdık (iPhone kavis payı)
            const tapeX = -vW / 2 + (isPortraitSimulated ? 40 : 45);
            const tapeY = -tapeH / 2;

            ctx.save();
            ctx.beginPath();
            ctx.rect(tapeX, tapeY, tapeW, tapeH);
            ctx.clip();

            ctx.fillStyle = "rgba(0,10,0,0.55)";
            ctx.fillRect(tapeX, tapeY, tapeW, tapeH);
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 1.5;
            ctx.strokeRect(tapeX, tapeY, tapeW, tapeH);

            let startSpeed = Math.floor(telemetry.speed / 10) * 10 - 30;
            ctx.fillStyle = "#00ff00";
            ctx.textAlign = "right";
            ctx.font = "11px monospace";

            for(let s = startSpeed; s <= startSpeed + 70; s += 10) {
                if (s < 0) continue;
                let relativeY = cy + (telemetry.speed - s) * (isPortraitSimulated ? 3 : 3.5);

                ctx.beginPath();
                ctx.moveTo(tapeX + tapeW, relativeY);
                ctx.lineTo(tapeX + tapeW - 8, relativeY);
                ctx.stroke();
                ctx.fillText(s, tapeX + tapeW - 12, relativeY + 4);
            }
            ctx.restore();

            // Sabit Sürat Penceresi
            ctx.fillStyle = "black";
            ctx.fillRect(tapeX - 4, cy - 12, tapeW + 8, 24);
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 1.5;
            ctx.strokeRect(tapeX - 4, cy - 12, tapeW + 8, 24);
            ctx.fillStyle = "#00ff00";
            ctx.font = "bold 13px monospace";
            ctx.textAlign = "center";
            ctx.fillText(telemetry.speed, tapeX + tapeW/2 - 6, cy + 4);
            ctx.font = "7px monospace";
            ctx.fillText("KM/H", tapeX + tapeW - 6, cy + 3);


            // --- 5. SAĞ BİLGİ PANELİ (İÇERİ ALINDI) ---
            let panelW = isPortraitSimulated ? 110 : 130;
            let panelH = 60;
            // Çentik ve sağ kavislerden kaçmak için mesafe artırıldı
            let px = vW / 2 - panelW - (isPortraitSimulated ? 40 : 45);
            let py = -vH / 2 + 30;
            
            ctx.fillStyle = "rgba(0,0,0,0.75)";
            ctx.fillRect(px, py, panelW, panelH);
            ctx.strokeStyle = "#00ff00";
            ctx.strokeRect(px, py, panelW, panelH);
            
            ctx.fillStyle = "#00ff00";
            ctx.font = "9px monospace";
            ctx.textAlign = "left";
            ctx.fillText(`RAKIM : ${telemetry.altitude} M`, px + 8, py + 15);
            ctx.fillText(`PITCH : ${Math.round(telemetry.pitch)}°`, px + 8, py + 28);
            ctx.fillText(`ROLL  : ${Math.round(telemetry.roll)}°`, px + 8, py + 41);
            
            ctx.fillStyle = telemetry.sensorType === "GPS NAV" ? "#00ff00" : "#ffaa00";
            ctx.font = "bold 8px monospace";
            ctx.fillText(`SRC: ${telemetry.sensorType}`, px + 8, py + 52);

            ctx.restore();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
