<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviation HUD Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: #00ff00;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 10;
        }
        button {
            background: #00ff00; color: black;
            border: none; padding: 15px 30px;
            font-size: 1.2rem; font-weight: bold;
            cursor: pointer; border-radius: 5px;
            box-shadow: 0 0 15px #00ff00;
            margin-bottom: 10px;
        }
        #calibrateBtn {
            position: absolute;
            bottom: 20px; right: 20px;
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00; border: 1px solid #00ff00;
            padding: 10px 15px; font-size: 0.8rem;
            z-index: 5; border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn">SİSTEMLERİ BAŞLAT</button>
        <p style="color: #aaa; text-align: center; font-size: 0.9rem; max-width: 80%;">
            Uygulamanın çalışması için konum ve hareket sensörü izinlerini onaylamanız gerekmektedir.<br>
            Telefonu aracınıza dik ve sabit şekilde sabitleyin.
        </p>
    </div>

    <button id="calibrateBtn">JIRO SIFIRLA (KALİBRE ET)</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const overlay = document.getElementById('overlay');

        // Uçuş Verileri Durumu
        let telemetry = {
            pitch: 0,       // Yunuslama (Öne/Arkaya)
            roll: 0,        // Yalpalama (Sağa/Sola)
            heading: 0,     // İstikamet (Rota)
            speed: 0,       // Sürat (km/h)
            altitude: 0     // Rakım (m)
        };

        // Kalibrasyon Ofsetleri
        let offset = { pitch: 0, roll: 0 };

        // Ekran Çözünürlük Ayarı
        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize);
        resize();

        // Sensör İzinleri ve Başlatma
        startBtn.addEventListener('click', async () => {
            // Geolocation (Hız ve İstikamet için en doğrusu)
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    if (pos.coords.speed !== null) {
                        // m/s -> km/h dönüşümü
                        telemetry.speed = Math.round(pos.coords.speed * 3.6); 
                    }
                    if (pos.coords.heading !== null && !isNaN(pos.coords.heading)) {
                        telemetry.heading = pos.coords.heading;
                    }
                    if (pos.coords.altitude !== null) {
                        telemetry.altitude = Math.round(pos.coords.altitude);
                    }
                }, (err) => console.log("GPS Hatası:", err), {
                    enableHighAccuracy: true,
                    maximumAge: 0
                });
            }

            // Jiroskop / İvmeölçer İzinleri (iOS 13+ için özel koruma)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                } catch (error) {
                    alert('Sensör izni reddedildi.');
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            overlay.style.display = 'none';
            animate();
        });

        // Telefon Dik Sabitlendiği İçin Oryantasyon Eşleme
        function handleOrientation(event) {
            // Telefon dikey/dik durduğunda:
            // beta: öne arkaya yatış (Pitch)
            // gamma: sağa sola yatış (Roll)
            // alpha: Manyetik pusula (Eğer GPS rotası yoksa kullanılır)
            
            telemetry.rawPitch = event.beta;
            telemetry.rawRoll = event.gamma;

            telemetry.pitch = event.beta - offset.pitch;
            telemetry.roll = event.gamma - offset.roll;

            if (telemetry.heading === 0 && event.webkitCompassHeading) {
                telemetry.heading = event.webkitCompassHeading; // iOS Pusula yedeti
            } else if (telemetry.heading === 0 && event.alpha) {
                telemetry.heading = 360 - event.alpha; // Android Pusula yedeti
            }
        }

        // Kalibrasyon Butonu (Mevcut duruşu sıfır kabul eder)
        calibrateBtn.addEventListener('click', () => {
            offset.pitch = telemetry.rawPitch || 0;
            offset.roll = telemetry.rawRoll || 0;
        });

        // Çizim Döngüsü (Render Loop)
        function animate() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const cx = w / 2;
            const cy = h / 2;

            ctx.clearRect(0, 0, w, h);

            // --- 1. JİROSKOP / YAPAY UFUK ÇİZİMİ (MERKEZ) ---
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(-telemetry.roll * Math.PI / 180); // Roll dönüşü
            
            let pitchPixels = telemetry.pitch * 4; // Her derece için 4 piksel kayma

            // Gökyüzü (Mavi) ve Yer (Kahverengi)
            ctx.fillStyle = "#144166"; // Gökyüzü mavisi
            ctx.fillRect(-w, -h * 2 + pitchPixels, w * 2, h * 2);
            ctx.fillStyle = "#593a17"; // Toprak kahvesi
            ctx.fillRect(-w, pitchPixels, w * 2, h * 2);

            // Ufuk Çizgisi
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-w/3, pitchPixels);
            ctx.lineTo(w/3, pitchPixels);
            ctx.stroke();

            // Pitch Merdiveni (Derece Çizgileri)
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "rgba(255,255,255,0.6)";
            ctx.lineWidth = 1.5;
            ctx.font = "12px monospace";
            ctx.textAlign = "center";

            for(let i = -30; i <= 30; i += 5) {
                if(i === 0) continue;
                let lineY = pitchPixels - (i * 4);
                let lineWidth = (i % 10 === 0) ? 60 : 30;

                ctx.beginPath();
                ctx.moveTo(-lineWidth, lineY);
                ctx.lineTo(lineWidth, lineY);
                ctx.stroke();

                if(i % 10 === 0) {
                    ctx.fillText(i, -lineWidth - 15, lineY + 4);
                    ctx.fillText(i, lineWidth + 15, lineY + 4);
                }
            }
            ctx.restore();

            // --- 2. SABİT UÇAK SİMGESİ (HUD) ---
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 4;
            ctx.beginPath();
            // Sol kanat
            ctx.moveTo(cx - 80, cy); ctx.lineTo(cx - 30, cy); ctx.lineTo(cx - 20, cy + 15);
            // Merkez nişangah
            ctx.moveTo(cx - 5, cy); ctx.lineTo(cx + 5, cy);
            ctx.moveTo(cx, cy - 5); ctx.lineTo(cx, cy + 5);
            // Sağ kanat
            ctx.moveTo(cx + 80, cy); ctx.lineTo(cx + 30, cy); ctx.lineTo(cx + 20, cy + 15);
            ctx.stroke();

            // --- 3. PUSULA ÇERÇEVESİ (Jiroskop Etrafında Dönen Ring) ---
            const compassRadius = Math.min(w, h) * 0.42;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(-telemetry.heading * Math.PI / 180); // Rota dönüşü

            // Dış Pusula Halkası
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, compassRadius, 0, 2 * Math.PI);
            ctx.stroke();

            // Pusula Dereceleri ve Yön Harfleri
            ctx.fillStyle = "#00ff00";
            ctx.font = "bold 14px monospace";
            ctx.textAlign = "center";

            for (let deg = 0; deg < 360; deg += 10) {
                let rad = deg * Math.PI / 180;
                let x1 = Math.sin(rad) * compassRadius;
                let y1 = -Math.cos(rad) * compassRadius;
                let x2 = Math.sin(rad) * (compassRadius - 8);
                let y2 = -Math.cos(rad) * (compassRadius - 8);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();

                if (deg % 30 === 0) {
                    let label = deg;
                    if (deg === 0) label = "N";
                    if (deg === 90) label = "E";
                    if (deg === 180) label = "S";
                    if (deg === 270) label = "W";

                    let tx = Math.sin(rad) * (compassRadius - 22);
                    let ty = -Math.cos(rad) * (compassRadius - 22);
                    
                    ctx.save();
                    ctx.translate(tx, ty);
                    ctx.rotate(rad); // Yazıların dik kalması veya halkaya uyması için
                    ctx.fillText(label, 0, 5);
                    ctx.restore();
                }
            }
            ctx.restore();

            // Sabit Üst Ok (Lubber Line - Gidilen Yön İşaretçisi)
            ctx.fillStyle = "#ff0000";
            ctx.beginPath();
            ctx.moveTo(cx, cy - compassRadius - 5);
            ctx.lineTo(cx - 8, cy - compassRadius - 20);
            ctx.lineTo(cx + 8, cy - compassRadius - 20);
            ctx.closePath();
            ctx.fill();

            // Dijital Yön Bilgisi Ekranı
            ctx.fillStyle = "black";
            ctx.fillRect(cx - 25, cy - compassRadius - 40, 50, 20);
            ctx.strokeStyle = "#00ff00";
            ctx.strokeRect(cx - 25, cy - compassRadius - 40, 50, 20);
            ctx.fillStyle = "#00ff00";
            ctx.font = "bold 14px monospace";
            ctx.fillText(String(Math.round(telemetry.heading)).padStart(3, '0') + "°", cx, cy - compassRadius - 25);


            // --- 4. UÇAK SÜRAT SAATİ (HIZ BANDI - SOLDA) ---
            const tapeW = 70;
            const tapeH = h * 0.7;
            const tapeX = 40;
            const tapeY = (h - tapeH) / 2;

            ctx.save();
            // Maskeleme (Hız bandının ekran dışına taşmaması için kafes oluşturuyoruz)
            ctx.beginPath();
            ctx.rect(tapeX, tapeY, tapeW, tapeH);
            ctx.clip();

            // Arka Plan Şeridi
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(tapeX, tapeY, tapeW, tapeH);
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 1.5;
            ctx.strokeRect(tapeX, tapeY, tapeW, tapeH);

            // Hareketli Hız Skalası (Her 10 km/h arası 30 piksel)
            let speedOffset = (telemetry.speed % 10) * 3; 
            let startSpeed = Math.floor(telemetry.speed / 10) * 10 - 50;

            ctx.fillStyle = "#00ff00";
            ctx.textAlign = "right";
            ctx.font = "14px monospace";

            for(let s = startSpeed; s <= startSpeed + 110; s += 10) {
                if (s < 0) continue;
                // Mevcut hıza göre çizginin ekrandaki Y konumu
                let relativeY = (cy) + (telemetry.speed - s) * 3; 

                ctx.beginPath();
                ctx.moveTo(tapeX + tapeW, relativeY);
                ctx.lineTo(tapeX + tapeW - 15, relativeY);
                ctx.stroke();

                ctx.fillText(s, tapeX + tapeW - 20, relativeY + 5);
            }
            ctx.restore();

            // Sabit Mevcut Hız Penceresi (Hız Bandının Tam Ortasında)
            ctx.fillStyle = "black";
            ctx.fillRect(tapeX + 5, cy - 15, tapeW + 15, 30);
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2;
            ctx.strokeRect(tapeX + 5, cy - 15, tapeW + 15, 30);
            
            ctx.fillStyle = "#00ff00";
            ctx.font = "bold 16px monospace";
            ctx.textAlign = "center";
            ctx.fillText(telemetry.speed, tapeX + 40, cy + 6);
            ctx.font = "9px monospace";
            ctx.fillText("KM/H", tapeX + tapeW + 5, cy + 5);


            // --- 5. DATA PANELİ (SAĞ ÜST) ---
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(w - 160, 20, 140, 60);
            ctx.strokeStyle = "#00ff00";
            ctx.strokeRect(w - 160, 20, 140, 60);
            
            ctx.fillStyle = "#00ff00";
            ctx.font = "12px monospace";
            ctx.textAlign = "left";
            ctx.fillText(`RAKIM: ${telemetry.altitude} m`, w - 150, 42);
            ctx.fillText(`PITCH: ${Math.round(telemetry.pitch)}°`, w - 150, 57);
            ctx.fillText(`ROLL:  ${Math.round(telemetry.roll)}°`, w - 150, 72);

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
