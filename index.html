<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Glass Cockpit HUD</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #030303;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: #00ff00;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95);
            z-index: 10;
        }
        button {
            background: #00ff00; color: black;
            border: none; padding: 15px 30px;
            font-size: 1.2rem; font-weight: bold;
            cursor: pointer; border-radius: 5px;
            box-shadow: 0 0 15px #00ff00;
            margin-bottom: 15px;
        }
        #calibrateBtn {
            position: absolute;
            bottom: 20px; right: 20px;
            background: rgba(0, 255, 0, 0.15);
            color: #00ff00; border: 1px solid #00ff00;
            padding: 12px 20px; font-size: 0.9rem; font-weight: bold;
            z-index: 5; border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startBtn">AVİYONİK SİSTEMLERİ AÇ</button>
        <p style="color: #888; text-align: center; font-size: 0.9rem; max-width: 80%; line-height: 1.4;">
            Ufuk çizgisi, hibrit pusula ve yedekli sürat saatinin çalışması için konum ve hareket izinlerini onaylayın.<br><br>
            <span style="color: #00ff00;">Cihaz Durumu: Telefon Dik (Dikey Sabit), Ekran: Yatay Tasarım</span>
        </p>
    </div>

    <button id="calibrateBtn">CAYRO SIFIRLA (KALİBRE ET)</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const overlay = document.getElementById('overlay');

        // Telemetri Hafızası
        let telemetry = {
            pitch: 0, rawPitch: 0,
            roll: 0, rawRoll: 0,
            heading: 0, gpsHeading: null, compassHeading: 0,
            speed: 0, altitude: 0,
            sensorType: "INIT"
        };

        // Kalibrasyon Ofsetleri
        let offset = { pitch: 0, roll: 0 };

        // Yedek Hız Hesaplayıcı İçin GPS Geçmişi
        let lastGpsTime = null;
        let lastLat = null;
        let lastLon = null;

        // İki koordinat arası mesafe hesaplama (Haversine Formülü)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Metre cinsinden dünya yarıçapı
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize);
        resize();

        // Sistem Başlatma Kontrolü
        startBtn.addEventListener('click', async () => {
            // 1. Gelişmiş GPS ve Hız Takibi
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    let currentSpeed = 0;

                    // Eğer cihaz ham hız veriyorsa kullan
                    if (pos.coords.speed !== null && pos.coords.speed > 0) {
                        currentSpeed = pos.coords.speed * 3.6;
                    } else {
                        // Yedek Hız Hesaplama Devreye Giriyor (Mesafe / Zaman)
                        const now = Date.now();
                        if (lastLat !== null && lastGpsTime !== null) {
                            const timeDelta = (now - lastGpsTime) / 1000; // saniye
                            if (timeDelta > 0.4) {
                                const distance = calculateDistance(lastLat, lastLon, pos.coords.latitude, pos.coords.longitude);
                                const calculatedSpeedMS = distance / timeDelta;
                                if (calculatedSpeedMS > 0.5 && calculatedSpeedMS < 60) { // gürültü filtresi
                                    currentSpeed = calculatedSpeedMS * 3.6;
                                }
                            }
                        }
                        lastLat = pos.coords.latitude;
                        lastLon = pos.coords.longitude;
                        lastGpsTime = now;
                    }

                    telemetry.speed = Math.round(currentSpeed);
                    telemetry.gpsHeading = pos.coords.heading;
                    if (pos.coords.altitude !== null) telemetry.altitude = Math.round(pos.coords.altitude);

                }, (err) => console.log("GPS Kesintisi:", err), {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                });
            }

            // 2. iOS ve Android Sensör İzin İstekleri
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    await DeviceOrientationEvent.requestPermission();
                    window.addEventListener('deviceorientation', handleCompass);
                    window.addEventListener('devicemotion', handleMotion);
                } catch (e) { alert('Sensör izni gerekiyor.'); }
            } else {
                window.addEventListener('deviceorientation', handleCompass);
                window.addEventListener('devicemotion', handleMotion);
            }

            overlay.style.display = 'none';
            animate();
        });

        // Pusula ve İstikamet Verisi İşleme
        function handleCompass(event) {
            if (event.webkitCompassHeading) {
                telemetry.compassHeading = event.webkitCompassHeading;
            } else if (event.alpha) {
                telemetry.compassHeading = 360 - event.alpha;
            }
        }

        // Kilitlenmeyen Cayro Sistemi (İvmeölçer Tabanlı Pitch/Roll Matematik Filtresi)
        function handleMotion(event) {
            let ax = event.accelerationIncludingGravity.x;
            let ay = event.accelerationIncludingGravity.y;
            let az = event.accelerationIncludingGravity.z;

            if (ax === null || ay === null || az === null) return;

            // Telefon dikey tutulduğu için yerçekimi vektörlerini eksenlere eşliyoruz
            // Düşük geçişli filtre (Low Pass Filter) sarsıntıları emer ve donmayı engeller
            let targetRoll = Math.atan2(ax, Math.sqrt(ay * ay + az * az)) * (180 / Math.PI);
            let targetPitch = Math.atan2(az, Math.sqrt(ax * ax + ay * ay)) * (180 / Math.PI);

            telemetry.rawRoll = targetRoll;
            telemetry.rawPitch = targetPitch;

            // %15 yeni veri, %85 eski veri yumuşatması (Yorulmayan yapay ufuk)
            telemetry.roll = (telemetry.roll * 0.85) + ((targetRoll - offset.roll) * 0.15);
            telemetry.pitch = (telemetry.pitch * 0.85) + ((targetPitch - offset.pitch) * 0.15);
        }

        // Kalibrasyon Butonu
        calibrateBtn.addEventListener('click', () => {
            offset.roll = telemetry.rawRoll;
            offset.pitch = telemetry.rawPitch;
        });

        // Ana Çizim Döngüsü
        function animate() {
            const w = window.innerWidth;
            const h = window.innerHeight;

            ctx.clearRect(0, 0, w, h);
            ctx.save();

            // Sanal Ekran Değişkenleri
            let vW, vH, cx, cy;

            // TELEFON DİK DURURKEN LANDSCAPE (YATAY) GÖRÜNTÜ MATRİSİ DÖNÜŞÜMÜ
            if (w < h) {
                ctx.translate(w / 2, h / 2);
                ctx.rotate(Math.PI / 2); // Ekranı yana yatırıyoruz
                vW = h; // Sanal genişlik fiziksel yükseklik olur
                vH = w; // Sanal yükseklik fiziksel genişlik olur
                cx = 0; cy = 0;
            } else {
                // Eğer telefon zaten yatay tutuluyorsa normal çiz
                ctx.translate(w / 2, h / 2);
                vW = w; vH = h;
                cx = 0; cy = 0;
            }

            // HİBRİT PUSULA SEÇİM MANTIĞI
            // Araç gidiyorsa GPS rotası, duruyorsa veya yavaşsa Manyetik Pusula devrededir
            if (telemetry.speed > 5 && telemetry.gpsHeading !== null && !isNaN(telemetry.gpsHeading)) {
                telemetry.heading = telemetry.gpsHeading;
                telemetry.sensorType = "GPS NAV";
            } else {
                telemetry.heading = telemetry.compassHeading;
                telemetry.sensorType = "MAG COMP";
            }

            // --- 1. JİRO / YAPAY UFUK ÇİZİMİ ---
            ctx.save();
            ctx.rotate(-telemetry.roll * Math.PI / 180);
            
            let pitchPixels = telemetry.pitch * 5; // Hassasiyet çarpanı

            // Gökyüzü ve Yer Alanları
            ctx.fillStyle = "#0c2840"; 
            ctx.fillRect(-vW, -vH * 2 + pitchPixels, vW * 2, vH * 2);
            ctx.fillStyle = "#3d250e"; 
            ctx.fillRect(-vW, pitchPixels, vW * 2, vH * 2);

            // Merkez Ana Ufuk Çizgisi
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-vW/3, pitchPixels);
            ctx.lineTo(vW/3, pitchPixels);
            ctx.stroke();

            // Pitch Merdiven Dereceleri
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "rgba(255,255,255,0.4)";
            ctx.lineWidth = 1.5;
            ctx.font = "12px monospace";
            ctx.textAlign = "center";

            for(let i = -40; i <= 40; i += 10) {
                if(i === 0) continue;
                let lineY = pitchPixels - (i * 5);
                ctx.beginPath();
                ctx.moveTo(-40, lineY); ctx.lineTo(40, lineY);
                ctx.stroke();
                ctx.fillText(i, -60, lineY + 4);
                ctx.fillText(i, 60, lineY + 4);
            }
            ctx.restore();

            // --- 2. SABİT UÇAK HUD SEMBOLÜ ---
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(cx - 70, cy); ctx.lineTo(cx - 30, cy); ctx.lineTo(cx - 20, cy + 12);
            ctx.moveTo(cx - 4, cy); ctx.lineTo(cx + 4, cy); ctx.moveTo(cx, cy - 4); ctx.lineTo(cx, cy + 4);
            ctx.moveTo(cx + 70, cy); ctx.lineTo(cx + 30, cy); ctx.lineTo(cx + 20, cy + 12);
            ctx.stroke();

            // --- 3. JİROSKOP ÇERÇEVESİ PUSULA (DÖNEN RİNG) ---
            const compassRadius = Math.min(vW, vH) * 0.43;
            ctx.save();
            ctx.rotate(-telemetry.heading * Math.PI / 180);

            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, compassRadius, 0, 2 * Math.PI);
            ctx.stroke();

            ctx.fillStyle = "#00ff00";
            ctx.font = "bold 13px monospace";
            ctx.textAlign = "center";

            for (let deg = 0; deg < 360; deg += 10) {
                let rad = deg * Math.PI / 180;
                let x1 = cx + Math.sin(rad) * compassRadius;
                let y1 = cy - Math.cos(rad) * compassRadius;
                let x2 = cx + Math.sin(rad) * (compassRadius - 8);
                let y2 = cy - Math.cos(rad) * (compassRadius - 8);

                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

                if (deg % 30 === 0) {
                    let headingLabel = deg;
                    if (deg === 0) headingLabel = "N";
                    if (deg === 90) headingLabel = "E";
                    if (deg === 180) headingLabel = "S";
                    if (deg === 270) headingLabel = "W";

                    let lx = cx + Math.sin(rad) * (compassRadius - 20);
                    let ly = cy - Math.cos(rad) * (compassRadius - 20);
                    
                    ctx.save();
                    ctx.translate(lx, ly);
                    ctx.rotate(rad);
                    ctx.fillText(headingLabel, 0, 4);
                    ctx.restore();
                }
            }
            ctx.restore();

            // Sabit Üst İstikamet Oku (Lubber Line)
            ctx.fillStyle = "#ff3333";
            ctx.beginPath();
            ctx.moveTo(cx, cy - compassRadius - 3);
            ctx.lineTo(cx - 8, cy - compassRadius - 15);
            ctx.lineTo(cx + 8, cy - compassRadius - 15);
            ctx.closePath(); ctx.fill();

            // Dijital İstikamet Penceresi
            ctx.fillStyle = "black";
            ctx.fillRect(cx - 30, cy - compassRadius - 38, 60, 20);
            ctx.strokeStyle = "#00ff00";
            ctx.strokeRect(cx - 30, cy - compassRadius - 38, 60, 20);
            ctx.fillStyle = "#00ff00";
            ctx.font = "bold 14px monospace";
            ctx.fillText(String(Math.round(telemetry.heading)).padStart(3, '0') + "°", cx, cy - compassRadius - 24);


            // --- 4. HAREKETLİ UÇAK SÜRAT SAATİ (SOLDA) ---
            const tapeW = 75;
            const tapeH = vH * 0.65;
            const tapeX = -vW / 2 + 35;
            const tapeY = -tapeH / 2;

            ctx.save();
            ctx.beginPath();
            ctx.rect(tapeX, tapeY, tapeW, tapeH);
            ctx.clip(); // Bant dışını maskele

            ctx.fillStyle = "rgba(0,5,0,0.6)";
            ctx.fillRect(tapeX, tapeY, tapeW, tapeH);
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 1.5;
            ctx.strokeRect(tapeX, tapeY, tapeW, tapeH);

            let startSpeed = Math.floor(telemetry.speed / 10) * 10 - 40;
            ctx.fillStyle = "#00ff00";
            ctx.textAlign = "right";
            ctx.font = "14px monospace";

            for(let s = startSpeed; s <= startSpeed + 90; s += 10) {
                if (s < 0) continue;
                let relativeY = cy + (telemetry.speed - s) * 3.5; // Piksel ölçeği

                ctx.beginPath();
                ctx.moveTo(tapeX + tapeW, relativeY);
                ctx.lineTo(tapeX + tapeW - 12, relativeY);
                ctx.stroke();
                ctx.fillText(s, tapeX + tapeW - 18, relativeY + 5);
            }
            ctx.restore();

            // Sabit Hız Gösterge Kutusu
            ctx.fillStyle = "black";
            ctx.fillRect(tapeX - 5, cy - 16, tapeW + 10, 32);
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;
            ctx.strokeRect(tapeX - 5, cy - 16, tapeW + 10, 32);
            ctx.fillStyle = "#00ff00";
            ctx.font = "bold 18px monospace";
            ctx.textAlign = "center";
            ctx.fillText(telemetry.speed, tapeX + 35, cy + 6);
            ctx.font = "9px monospace";
            ctx.fillText("KM/H", tapeX + tapeW - 3, cy + 5);


            // --- 5. SAĞ VERİ PANELİ ---
            let px = vW / 2 - 155;
            let py = -vH / 2 + 25;
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(px, py, 135, 75);
            ctx.strokeStyle = "#00ff00";
            ctx.strokeRect(px, py, 135, 75);
            
            ctx.fillStyle = "#00ff00";
            ctx.font = "11px monospace";
            ctx.textAlign = "left";
            ctx.fillText(`RAKIM : ${telemetry.altitude} M`, px + 10, py + 20);
            ctx.fillText(`PITCH : ${Math.round(telemetry.pitch)}°`, px + 10, py + 38);
            ctx.fillText(`ROLL  : ${Math.round(telemetry.roll)}°`, px + 10, py + 56);
            
            // Sensör Kaynağı İndikatörü
            ctx.fillStyle = telemetry.sensorType === "GPS NAV" ? "#00ff00" : "#ffaa00";
            ctx.font = "bold 9px monospace";
            ctx.fillText(`HDG SRC: ${telemetry.sensorType}`, px + 10, py + 69);

            ctx.restore();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
